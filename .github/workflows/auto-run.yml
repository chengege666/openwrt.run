name: 触发所有工作流

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: auto-run
  cancel-in-progress: false

jobs:
  dispatch-all:
    runs-on: ubuntu-22.04
    if: github.repository_owner == 'chengege666'

    steps:
      - uses: actions/checkout@v4

      - name: Trigger all workflows
        run: |
          for workflow in .github/workflows/*.yml; do
            name=$(basename "$workflow")
            case "$name" in
              auto-run.yml|cleanup-releases.yml)
                echo "跳过: $name"
                continue
                ;;
            esac
            echo "触发工作流: $name"
            gh workflow run "$name" --repo "${{ github.repository }}"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "已触发以下工作流："
          for workflow in .github/workflows/*.yml; do
            name=$(basename "$workflow")
            [ "$name" == "auto-run.yml" ] || [ "$name" == "cleanup-releases.yml" ] && continue
            echo "  - ${name%.yml}"
          done
