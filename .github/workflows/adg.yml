name: Build AdGuardHome .run (Luci only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Workspace
        run: |
          mkdir -p adg-x86_64
          git clone https://github.com/megastep/makeself.git

      - name: Download Luci App
        run: |
          LATEST_IPK_URL=$(curl -s https://api.github.com/repos/rufengsuixing/luci-app-adguardhome/releases/latest | jq -r '.assets[] | select(.name | endswith("all.ipk")) | .browser_download_url' | head -n 1)
          if [ -z "$LATEST_IPK_URL" ]; then exit 1; fi
          wget "$LATEST_IPK_URL" -P adg-x86_64/

      - name: Create install.sh
        run: |
          cat << 'EOF' > adg-x86_64/install.sh
          #!/bin/sh
          echo "===> 正在安装插件..."
          opkg install --force-depends *.ipk
          opkg update && opkg install wget-ssl jq

          echo "===> 正在动态配置核心更新链接..."
          # 获取 AdGuardHome 最新版本号
          VERSION=$(curl -s https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r .tag_name)
          
          # 定义更新链接模板
          # 注意：为了让插件能识别，我们将其设置为唯一选项
          TARGET_URL="https://github.com/AdguardTeam/AdGuardHome/releases/download/${VERSION}/AdGuardHome_linux_amd64.tar.gz"

          # 针对该插件的 UCI 逻辑，必须使用 uci add_list 或者直接 set
          # 先清理旧的 update_url 设置
          uci delete AdGuardHome.@adguardhome[0].update_url 2>/dev/null
          
          # 写入新的下载链接
          uci set AdGuardHome.@adguardhome[0].update_url="$TARGET_URL"
          
          # 提交更改
          uci commit AdGuardHome
          
          # 重启服务以应用配置
          /etc/init.d/AdGuardHome restart
          echo "核心更新链接已配置为: $TARGET_URL"
          EOF
          chmod +x adg-x86_64/install.sh

      - name: Create self-extracting .run package
        run: |
          ./makeself/makeself.sh adg-x86_64/ AdGuardHome-luci-x86_64.run "AdGuardHome Luci Installer" ./install.sh

      - name: Upload run file as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: luci-app-adguardhome-latest
          name: "AdGuardHome Web 界面离线安装包"
          files: AdGuardHome-luci-x86_64.run
          body: |
            ### AdGuardHome 离线包
            - 自动获取 AdGuardHome 最新版本号并配置
            - 自动预设更新链接
            - 安装完成执行后，请在 Web 界面点击“更新核心”即可下载最新版
