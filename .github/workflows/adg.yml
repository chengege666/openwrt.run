name: Build AdGuardHome .run (Luci only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Workspace
        run: |
          mkdir -p adg-x86_64
          git clone https://github.com/megastep/makeself.git

      - name: Download Luci App
        run: |
          echo "正在自动获取最新 luci-app-adguardhome ipk..."
          LATEST_IPK_URL=$(curl -s https://api.github.com/repos/rufengsuixing/luci-app-adguardhome/releases/latest | jq -r '.assets[] | select(.name | endswith("all.ipk")) | .browser_download_url' | head -n 1)

          if [ -z "$LATEST_IPK_URL" ]; then
            echo "错误：未找到有效的 .ipk 文件！"
            exit 1
          fi
          wget "$LATEST_IPK_URL" -P adg-x86_64/
          echo "下载成功: $LATEST_IPK_URL"

      - name: Create install.sh
        run: |
          cat << 'EOF' > adg-x86_64/install.sh
          #!/bin/sh
          echo "===> 正在安装主程序与中文语言包..."
          opkg install --force-depends *.ipk

          echo "===> 安装必要工具 (wget-ssl，用于后续更新核心)..."
          opkg update
          opkg install wget-ssl

          echo "===> 正在设置更新核心地址..."
          sleep 2
          if uci show AdGuardHome >/dev/null 2>&1; then
            uci set AdGuardHome.@adguardhome[0].core_update_url='https://github.com/AdguardTeam/AdGuardHome/releases/download/${Cloud_Version}/AdGuardHome_linux_${Arch}.tar.gz'
            uci commit AdGuardHome
            echo "更新地址已写入官方源（含变量）。"
          else
            echo "AdGuardHome 配置未生成，可稍后在 Web 界面手动设置升级链接。"
          fi

          echo "===> 安装完成！核心请通过 Web 界面“更新核心”按钮下载。"
          EOF
          chmod +x adg-x86_64/install.sh

      - name: Create self-extracting .run package
        run: |
          # 包名不再包含版本号，因为核心版本由用户按需更新
          ./makeself/makeself.sh adg-x86_64/ AdGuardHome-luci-x86_64.run "AdGuardHome Luci Installer" ./install.sh

      - name: Upload run file as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: luci-app-adguardhome-latest
          name: "AdGuardHome Web 界面离线安装包"
          files: AdGuardHome-luci-x86_64.run
          body: |
            ### AdGuardHome 界面离线包 (不含核心)
            - 仅包含 luci-app-adguardhome 最新版
            - 自动配置更新核心链接为官方地址
            - 首次安装后请到 Web 管理页点“更新核心”下载 AdGuardHome 二进制文件
            - 使用方式：上传到 /tmp，执行 `chmod +x *.run && ./*.run`
