name: Build AdG x86_64 Offline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Workspace
        run: mkdir -p adg-build

      - name: Download Files
        run: |
          # 1. 获取并下载 AdGuardHome x86_64 核心
          CORE_TAG=$(curl -s https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r .tag_name)
          echo "正在下载 AdGuardHome 版本: $CORE_TAG"
          wget "https://github.com/AdguardTeam/AdGuardHome/releases/download/${CORE_TAG}/AdGuardHome_linux_amd64.tar.gz" -O core.tar.gz
          
          # 2. 解压并使用 find 智能寻找可执行文件
          mkdir -p temp_core
          tar -zxvf core.tar.gz -C temp_core
          # 查找并移动二进制文件到 adg-build 根目录
          find temp_core -type f -name "AdGuardHome" -exec cp {} adg-build/ \;
          
          # 3. 下载 luci-app 和中文包
          BASE_URL="https://github.com/rufengsuixing/luci-app-adguardhome/releases/latest/download"
          wget $BASE_URL/luci-app-adguardhome_all.ipk -P adg-build/
          wget $BASE_URL/luci-i18n-adguardhome-zh-cn_all.ipk -P adg-build/

      - name: Create Installer
        run: |
          cat << 'EOF' > adg-build/install.sh
          #!/bin/sh
          echo "--- 开始安装 AdGuardHome (x86_64) ---"
          
          # 1. 安装 ipk 包
          opkg install *.ipk
          
          # 2. 部署核心二进制文件
          # 确保目录存在
          mkdir -p /usr/bin/AdGuardHome
          
          # 移动核心程序并赋予执行权限
          if [ -f "AdGuardHome" ]; then
              cp AdGuardHome /usr/bin/AdGuardHome/AdGuardHome
              chmod +x /usr/bin/AdGuardHome/AdGuardHome
              echo "核心程序部署成功。"
          else
              echo "错误：未找到 AdGuardHome 核心程序文件！"
              exit 1
          fi
          
          echo "--- 安装完成，请在 OpenWrt 界面刷新查看 ---"
          EOF
          chmod +x adg-build/install.sh

      - name: Package
        run: |
          # 打包为 .run 文件
          tar -zcvf adguardhome_x86_64_offline.run -C adg-build .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: adguardhome-x86_64
          path: adguardhome_x86_64_offline.run
