name: Build and Release IPK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p adg-build/data/usr/bin/AdGuardHome
          mkdir -p adg-build/control

      - name: Download Files
        run: |
          CORE_TAG=$(curl -s https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r .tag_name)
          wget "https://github.com/AdguardTeam/AdGuardHome/releases/download/${CORE_TAG}/AdGuardHome_linux_amd64.tar.gz" -O core.tar.gz
          mkdir -p temp_core
          tar -zxvf core.tar.gz -C temp_core
          find temp_core -type f -name "AdGuardHome" -exec cp {} adg-build/data/usr/bin/AdGuardHome/ \;
          
          REPO="rufengsuixing/luci-app-adguardhome"
          URLS=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" | jq -r '.assets[] | select(.name | endswith(".ipk")) | .browser_download_url')
          for url in $URLS; do
            wget -q "$url" -P adg-build/
          done

      - name: Create IPK Control
        run: |
          cat << 'EOF' > adg-build/control/control
          Package: adguardhome-bundle
          Version: 1.0-1
          Architecture: x86_64
          Maintainer: User
          Depends: luci-app-adguardhome, luci-i18n-adguardhome-zh-cn
          Description: AdGuardHome Bundle for iStore
          EOF
          cat << 'EOF' > adg-build/control/postinst
          #!/bin/sh
          chmod +x /usr/bin/AdGuardHome/AdGuardHome
          exit 0
          EOF
          chmod +x adg-build/control/postinst

      - name: Package to IPK
        run: |
          cd adg-build
          tar -czf control.tar.gz -C control .
          tar -czf data.tar.gz -C data .
          echo "2.0" > debian-binary
          tar -czf adguardhome_bundle_x86_64.ipk control.tar.gz data.tar.gz debian-binary
          mv adguardhome_bundle_x86_64.ipk ../

      # 关键步骤：先生成 tag 环境变量
      - name: Set Tag Name
        id: vars
        run: echo "tag_name=v$(date +%Y.%m.%d-%H%M)" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag_name }}
          files: adguardhome_bundle_x86_64.ipk
