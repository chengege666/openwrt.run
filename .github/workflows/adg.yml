name: Build AdGuardHome .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p adg-x86_64
          git clone https://github.com/megastep/makeself.git

      - name: Download Files
        run: |
          # 获取 AdGuardHome 核心
          LATEST_TAG=$(curl -s https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r .tag_name)
          wget "https://github.com/AdguardTeam/AdGuardHome/releases/download/${LATEST_TAG}/AdGuardHome_linux_amd64.tar.gz" -O core.tar.gz
          tar -zxvf core.tar.gz -C adg-x86_64 --strip-components=1 AdGuardHome/AdGuardHome
          
          # 下载插件 (使用稳定版链接)
          wget https://github.com/wukongdaily/RunFilesBuilder/releases/download/AdGuardHome_v0.107.55/luci-app-adguardhome-all.ipk -P adg-x86_64/

      - name: Create install.sh
        run: |
          cat << 'EOF' > adg-x86_64/install.sh
          #!/bin/sh
          echo "Installing IPK..."
          opkg install *.ipk
          echo "Installing Core..."
          mkdir -p /usr/bin/AdGuardHome
          mv AdGuardHome /usr/bin/AdGuardHome/
          chmod +x /usr/bin/AdGuardHome/AdGuardHome
          echo "Done."
          EOF
          chmod +x adg-x86_64/install.sh

      - name: Create .run file
        run: |
          ./makeself/makeself.sh adg-x86_64/ AdGuardHome_x86_64.run "AdGuardHome Installer" ./install.sh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-$(date +%Y%m%d-%H%M)
          files: AdGuardHome_x86_64.run
