name: Build and Release AdG x86_64

on:
  workflow_dispatch: # 支持手动点击运行

permissions:
  contents: write # 必须：赋予 Release 写入权限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Workspace
        run: mkdir -p adg-build

      - name: Download Files
        run: |
          # 1. 自动获取版本信息
          CORE_TAG=$(curl -s https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r .tag_name)
          echo "CORE_VERSION=$CORE_TAG" >> $GITHUB_ENV
          
          # 2. 下载核心程序
          wget "https://github.com/AdguardTeam/AdGuardHome/releases/download/${CORE_TAG}/AdGuardHome_linux_amd64.tar.gz" -O core.tar.gz
          mkdir -p temp_core
          tar -zxvf core.tar.gz -C temp_core
          find temp_core -type f -name "AdGuardHome" -exec cp {} adg-build/ \;
          
          # 3. 自动下载插件
          REPO="rufengsuixing/luci-app-adguardhome"
          URLS=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" | jq -r '.assets[] | select(.name | endswith(".ipk")) | .browser_download_url')
          for url in $URLS; do
            wget -q "$url" -P adg-build/
          done

      - name: Create Installer
        run: |
          cat << 'EOF' > adg-build/install.sh
          #!/bin/sh
          echo "开始安装..."
          opkg install *.ipk
          mkdir -p /usr/bin/AdGuardHome
          [ -f "AdGuardHome" ] && cp AdGuardHome /usr/bin/AdGuardHome/AdGuardHome && chmod +x /usr/bin/AdGuardHome/AdGuardHome
          echo "安装结束。"
          EOF
          chmod +x adg-build/install.sh

      - name: Package
        run: tar -zcvf adguardhome_x86_64_offline.run -C adg-build .

      - name: Generate Tag
        id: tag
        run: |
          # 生成类似 v2026.05.02 的标签
          TAG_NAME="v$(date +%Y.%m.%d)"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "AdGuardHome x86_64 Offline Build ${{ env.CORE_VERSION }}"
          body: |
            ### AdGuardHome 离线安装包
            - 核心版本: ${{ env.CORE_VERSION }}
            - 架构: x86_64
            - 包含: AdGuardHome 核心 + luci-app + 中文包
          files: adguardhome_x86_64_offline.run
          draft: false
          prerelease: false
