name: Make daed run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directories
        run: mkdir -p x86_64/depends a53/depends

      - name: Get daed main app
        run: |
          LATEST_JSON=$(curl -s https://api.github.com/repos/QiuSimons/luci-app-daed/releases/latest)
          VERSION=$(echo "$LATEST_JSON" | jq -r '.tag_name')
          echo "version=$VERSION" >> $GITHUB_ENV
          
          # 获取 .ipk 下载链接
          URL=$(echo "$LATEST_JSON" | jq -r '.assets[] | select(.name | endswith(".ipk")) | .browser_download_url')
          curl -L -o x86_64/luci-app-daed.ipk "$URL"
          cp x86_64/luci-app-daed.ipk a53/luci-app-daed.ipk

      - name: Download core dependencies
        run: |
          # daed 依赖 daed 和 nft-nftables 等核心组件
          # 从 openwrt.ai 对应架构下载
          DEPS=("daed" "nft-nftables" "kmod-nft-tproxy")
          BASE_URLS=("https://dl.openwrt.ai/packages-24.10/x86_64/kiddin9/" "https://dl.openwrt.ai/packages-24.10/aarch64_cortex-a53/kiddin9/")
          DIRS=("x86_64" "a53")

          for i in {0..1}; do
            URL="${BASE_URLS[$i]}"
            TARGET_DIR="${DIRS[$i]}/depends"
            for DEP in "${DEPS[@]}"; do
              # 搜索并下载对应依赖
              FILE=$(wget -qO- "$URL" | grep -oP "href=\"\K$DEP[^>]*\.ipk" | head -n 1)
              if [ ! -z "$FILE" ]; then
                curl -L --fail "${URL}${FILE}" -o "$TARGET_DIR/$FILE"
              fi
            done
          done

      - name: Create install.sh
        run: |
          cat << 'EOF' > install.sh
          #!/bin/sh
          set -e
          opkg update
          # 先安装依赖
          if [ -d "depends" ]; then
            opkg install depends/*.ipk --force-depends || true
          fi
          # 再安装主程序
          opkg install luci-app-daed.ipk --force-depends
          EOF
          chmod +x install.sh
          cp install.sh x86_64/
          cp install.sh a53/

      - name: Install makeself
        run: sudo apt-get update && sudo apt-get install -y makeself

      - name: Create .run packages
        run: |
          mkdir -p output
          makeself x86_64/ "output/daed_x86_64-${{ env.version }}.run" "daed x86_64 Installer" ./install.sh
          makeself a53/ "output/daed_aarch64_cortex-a53-${{ env.version }}.run" "daed a53 Installer" ./install.sh

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daed-${{ env.version }}
          files: output/*.run