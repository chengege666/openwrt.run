name: Make daed run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directories
        run: mkdir -p x86_64/depends a53/depends

      - name: Get daed main app
        run: |
          # 1. 获取 GitHub 最新 Release 的 Tag 名字
          VERSION=$(curl -s https://api.github.com/repos/QiuSimons/luci-app-daed/releases/latest | jq -r '.tag_name')
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "Latest version detected: $VERSION"
          
          # 2. 精准抓取 assets 中以 .ipk 结尾的第一个文件的下载链接
          URL=$(curl -s https://api.github.com/repos/QiuSimons/luci-app-daed/releases/latest | jq -r '.assets[] | select(.name | endswith(".ipk")) | .browser_download_url' | head -n 1)
          
          echo "Downloading from: $URL"
          
          # 3. 下载并存入目录 (QiuSimons 的包是 all 通用包，两个架构共用)
          curl -L --fail -o x86_64/luci-app-daed.ipk "$URL"
          cp x86_64/luci-app-daed.ipk a53/luci-app-daed.ipk

      - name: Download core dependencies
        run: |
          # 4. 从 openwrt.ai 获取 daed 的核心二进制和防火墙依赖
          DEPS=("daed" "nft-nftables" "kmod-nft-tproxy")
          URL_X86="https://dl.openwrt.ai/packages-24.10/x86_64/kiddin9/"
          URL_A53="https://dl.openwrt.ai/packages-24.10/aarch64_cortex-a53/kiddin9/"

          for DEP in "${DEPS[@]}"; do
            # 下载 x86 依赖
            FILE_X86=$(wget -qO- "$URL_X86" | grep -oP 'href="\K[^"]*\.ipk' | grep "$DEP" | head -n 1)
            if [ -n "$FILE_X86" ]; then
              echo "Downloading x86 dep: $FILE_X86"
              curl -L --fail "${URL_X86}${FILE_X86}" -o "x86_64/depends/$FILE_X86"
            fi
            
            # 下载 a53 依赖
            FILE_A53=$(wget -qO- "$URL_A53" | grep -oP 'href="\K[^"]*\.ipk' | grep "$DEP" | head -n 1)
            if [ -n "$FILE_A53" ]; then
              echo "Downloading a53 dep: $FILE_A53"
              curl -L --fail "${URL_A53}${FILE_A53}" -o "a53/depends/$FILE_A53"
            fi
          done

      - name: Create install.sh
        run: |
          cat << 'EOF' > install.sh
          #!/bin/sh
          set -e
          echo "===> 更新软件源..."
          opkg update
          echo "===> 安装依赖组件 (如有失败会尝试跳过)..."
          opkg install depends/*.ipk --force-depends || true
          echo "===> 安装 daed 主程序..."
          opkg install luci-app-daed.ipk --force-depends
          echo "===> 安装完成！"
          EOF
          chmod +x install.sh
          cp install.sh x86_64/
          cp install.sh a53/

      - name: Install makeself
        run: sudo apt-get update && sudo apt-get install -y makeself

      - name: Create .run packages
        run: |
          mkdir -p output
          makeself x86_64/ "output/daed_x86_64-${{ env.version }}.run" "daed x86_64 Installer" ./install.sh
          makeself a53/ "output/daed_aarch64_cortex-a53-${{ env.version }}.run" "daed a53 Installer" ./install.sh

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daed-${{ env.version }}
          name: DAED-${{ env.version }}
          files: output/*.run