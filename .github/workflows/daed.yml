name: Make Daed run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install makeself and curl
        run: |
          sudo apt-get update
          sudo apt-get install -y makeself curl

      - name: Download ipk packages
        run: |
          chmod +x shell/daed.sh
          ./shell/daed.sh

      - name: Copy install.sh and list files
        run: |
          chmod +x shell/daed-install.sh
          for platform in x86_64 aarch64_generic aarch64_cortex-a53; do
            if [ -d "$platform" ]; then
              echo "=== $platform contents ==="
              ls -lh "$platform/" 2>/dev/null || echo "  (empty)"
              [ -f "$platform/depends/luci-app-daed"*.ipk ] && mv "$platform/depends/luci-app-daed"*.ipk "$platform/" 2>/dev/null || true
              [ -f "$platform/depends/luci-app-dae"*.ipk ] && mv "$platform/depends/luci-app-dae"*.ipk "$platform/" 2>/dev/null || true
              cp shell/daed-install.sh "$platform/install.sh"
              chmod +x "$platform/install.sh"
            fi
          done

      - name: Parse version
        id: setver
        run: |
          for platform in x86_64 aarch64_generic aarch64_cortex-a53; do
            for file in "$platform"/luci-app-daed*.ipk "$platform"/luci-app-dae*.ipk "$platform"/luci-app-dae*.ipk; do
              if [ -f "$file" ]; then
                  base=${file##*/}
                  tmp=${base#*_}
                  version=${tmp%_all.ipk}
                  version=${version%%~*}
                  echo "version=$version" >> "$GITHUB_OUTPUT"
                  echo "Raw: $base → Cleaned: $version"
                  break 2
              fi
            done
          done

      - name: Create .run packages
        run: |
          mkdir -p output
          VERSION="${{ steps.setver.outputs.version }}"
          echo "Using version: $VERSION"
          for platform in x86_64 aarch64_generic aarch64_cortex-a53; do
            if [ -d "$platform" ] && [ "$(ls -A "$platform"/*.ipk 2>/dev/null)" ]; then
              makeself "$platform" "output/daed-${VERSION}_${platform}.run" "daed ${platform} Installer v${VERSION}" ./install.sh
            fi
          done
          ls -lh output/

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daed-${{ steps.setver.outputs.version }}
          name: daed-${{ steps.setver.outputs.version }}
          files: output/*.run
