name: Make Daed run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install makeself, curl and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y makeself curl jq

      - name: Download ipk packages
        run: |
          chmod +x shell/daed.sh
          ./shell/daed.sh

      - name: Read version and organize packages
        id: setver
        run: |
          version="$(cat /tmp/daed_version.txt)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Cleaned version: $version"

          for platform in x86_64 aarch64_generic aarch64_cortex-a53; do
            if [ -d "$platform" ]; then
              echo "=== $platform ==="
              ls -lh "$platform/depends/" 2>/dev/null || true

              # 移动 luci-app-daed 到根目录
              [ -f "$platform/depends/luci-app-daed"*.ipk ] && mv "$platform/depends/luci-app-daed"*.ipk "$platform/" 2>/dev/null || true

              # 复制 install.sh
              cp shell/daed-install.sh "$platform/install.sh"
              chmod +x "$platform/install.sh"

              echo "--- $platform final ---"
              ls -lh "$platform/"
            fi
          done

      - name: Create .run packages
        run: |
          mkdir -p output
          VERSION="${{ steps.setver.outputs.version }}"
          echo "Using version: $VERSION"
          for platform in x86_64 aarch64_generic aarch64_cortex-a53; do
            if [ -d "$platform" ] && [ "$(ls -A "$platform"/*.ipk 2>/dev/null)" ]; then
              makeself "$platform" "output/daed-${VERSION}_${platform}.run" "daed ${platform} Installer v${VERSION}" ./install.sh
            fi
          done
          ls -lh output/

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daed-${{ steps.setver.outputs.version }}
          name: daed-${{ steps.setver.outputs.version }}
          files: output/*.run
