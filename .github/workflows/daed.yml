name: Make Daed run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 makeself、curl 和 jq
        run: |
          sudo apt-get update
          sudo apt-get install -y makeself curl jq

      - name: 下载 ipk 包
        run: |
          chmod +x shell/daed.sh
          ./shell/daed.sh

      - name: 校验并整理包
        id: setver
        run: |
          version="$(cat /tmp/daed_version.txt)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "版本号: $version"

          for platform in x86_64 aarch64_generic aarch64_cortex-a53; do
            if [ ! -d "$platform" ]; then
              echo "跳过 $platform（目录不存在）"
              continue
            fi

            echo "=== $platform ==="
            ls -lh "$platform/depends/" 2>/dev/null || true

            # 校验中文包存在
            i18n_count=$(ls "$platform/depends/luci-i18n-daed-zh-cn"*.ipk 2>/dev/null | wc -l)
            if [ "$i18n_count" -eq 0 ]; then
              echo "错误：$platform 缺少中文翻译包 luci-i18n-daed-zh-cn"
              exit 1
            fi
            echo "中文包已下载: $i18n_count 个"

            # 移动 luci-app-daed 到根目录
            luci_count=$(ls "$platform/depends/luci-app-daed"*.ipk 2>/dev/null | wc -l)
            if [ "$luci_count" -eq 0 ]; then
              echo "错误：$platform 缺少 luci-app-daed"
              exit 1
            fi
            mv "$platform/depends/luci-app-daed"*.ipk "$platform/" 2>/dev/null || true
            echo "LuCI 界面包已移到根目录"

            # 复制 install.sh
            cp shell/daed-install.sh "$platform/install.sh"
            chmod +x "$platform/install.sh"

            echo "--- $platform 最终内容 ---"
            ls -lh "$platform/"
            ls -lh "$platform/depends/"
          done

      - name: 打包 .run 文件
        run: |
          mkdir -p output
          VERSION="${{ steps.setver.outputs.version }}"
          echo "版本: $VERSION"
          for platform in x86_64 aarch64_generic aarch64_cortex-a53; do
            if [ -d "$platform" ] && [ -f "$platform/luci-app-daed"*.ipk ]; then
              makeself "$platform" "output/daed-${VERSION}_${platform}.run" "Daed ${platform} 安装包 v${VERSION}" ./install.sh
            fi
          done
          ls -lh output/

      - name: 上传 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daed-${{ steps.setver.outputs.version }}
          name: daed-${{ steps.setver.outputs.version }}
          body_path: info/daed.md
          files: output/*.run
