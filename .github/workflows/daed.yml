name: Build daed .run Installer

on:
  workflow_dispatch:
    inputs:
      script_path:
        description: '仓库中用于下载 ipk 的脚本路径'
        required: true
        default: 'scripts/download_ipks.sh'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y makeself curl

      - name: Run download script
        run: |
          chmod +x ${{ github.event.inputs.script_path }}
          ./${{ github.event.inputs.script_path }}

      - name: Build .run packages
        run: |
          mkdir -p output
          # 假设脚本下载后结构为：./dist/x86_64/*.ipk 等
          for dir in dist/*/; do
            [ -d "$dir" ] || continue
            platform=$(basename "$dir")
            
            # 4. 复制 install.sh
            cp install.sh "$dir"
            
            # 5 & 7. 提取版本号并清理 (匹配 daed_0.x.x~xxx.ipk 格式)
            # 使用 sed 清理 ~ 及其后内容
            first_ipk=$(ls "$dir"/*.ipk | head -n 1)
            full_name=$(basename "$first_ipk")
            clean_version=$(echo "$full_name" | sed -E 's/daed_([0-9.]+).*/\1/')
            
            # 将版本号存入环境变量以便 Release 使用
            echo "CLEAN_VERSION=$clean_version" >> $GITHUB_ENV
            
            # 6. 打包
            makeself "$dir" "output/daed-${clean_version}-${platform}.run" "daed-installer" ./install.sh
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: daed-${{ env.CLEAN_VERSION }}
          name: daed ${{ env.CLEAN_VERSION }}
          files: output/*.run
          body: "Automated build for daed version ${{ env.CLEAN_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}