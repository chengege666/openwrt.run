name: Make daed run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directories
        run: mkdir -p x86_64/depends a53/depends

      - name: Get daed main app
        run: |
          # 直接抓取 GitHub Releases 页面源码并匹配 .ipk 链接
          RELEASE_URL="https://github.com/QiuSimons/luci-app-daed/releases/latest"
          # 匹配链接并转换为完整下载地址
          URL=$(wget -qO- "$RELEASE_URL" | grep -oP '/QiuSimons/luci-app-daed/releases/download/[^/]+/luci-app-daed[^"]*\.ipk' | head -n 1)
          FULL_URL="https://github.com$URL"
          
          # 提取版本号
          VERSION=$(echo "$URL" | awk -F'/' '{print $(NF-1)}')
          echo "version=$VERSION" >> $GITHUB_ENV
          
          echo "Downloading from: $FULL_URL"
          curl -L --fail -o x86_64/luci-app-daed.ipk "$FULL_URL"
          cp x86_64/luci-app-daed.ipk a53/luci-app-daed.ipk

      - name: Download core dependencies
        run: |
          # 从 openwrt.ai 自动抓取核心依赖
          DEPS=("daed" "nft-nftables" "kmod-nft-tproxy")
          URL_X86="https://dl.openwrt.ai/packages-24.10/x86_64/kiddin9/"
          URL_A53="https://dl.openwrt.ai/packages-24.10/aarch64_cortex-a53/kiddin9/"

          for DEP in "${DEPS[@]}"; do
            # 下载 x86 依赖
            FILE_X86=$(wget -qO- "$URL_X86" | grep -oP "$DEP[^>]*\.ipk" | head -n 1)
            [ ! -z "$FILE_X86" ] && curl -L --fail "${URL_X86}${FILE_X86}" -o "x86_64/depends/$FILE_X86"
            
            # 下载 a53 依赖
            FILE_A53=$(wget -qO- "$URL_A53" | grep -oP "$DEP[^>]*\.ipk" | head -n 1)
            [ ! -z "$FILE_A53" ] && curl -L --fail "${URL_A53}${FILE_A53}" -o "a53/depends/$FILE_A53"
          done

      - name: Create install.sh
        run: |
          cat << 'EOF' > install.sh
          #!/bin/sh
          set -e
          echo "===> 更新软件源..."
          opkg update
          echo "===> 安装依赖..."
          opkg install depends/*.ipk --force-depends || true
          echo "===> 安装 daed 主程序..."
          opkg install luci-app-daed.ipk --force-depends
          echo "===> 安装完成！"
          EOF
          chmod +x install.sh
          cp install.sh x86_64/
          cp install.sh a53/

      - name: Install makeself
        run: sudo apt-get update && sudo apt-get install -y makeself

      - name: Create .run packages
        run: |
          mkdir -p output
          makeself x86_64/ "output/daed_x86_64-${{ env.version }}.run" "daed x86_64 Installer" ./install.sh
          makeself a53/ "output/daed_aarch64_cortex-a53-${{ env.version }}.run" "daed a53 Installer" ./install.sh

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daed-${{ env.version }}
          name: DAED-${{ env.version }}
          files: output/*.run