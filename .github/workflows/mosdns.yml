name: Build MosDNS .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: mkdir -p mosdns_x86_64

      - name: Fetch Latest Tag
        run: |
          # 获取最新版本号
          latest_tag=$(curl -sk https://api.github.com/repos/sbwml/luci-app-mosdns/releases | grep "tag_name" | head -n 1 | awk -F '"' '{print $4}')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV

      - name: Download all required files
        run: |
          # 1. 获取该版本所有下载链接
          curl -sk "https://api.github.com/repos/sbwml/luci-app-mosdns/releases" > releases.json
          
          # 2. 定义过滤关键字，只要 x86_64 相关和通用的 ipk
          # 包含：mosdns 核心、v2dat、luci-app、i18n、geoip、geosite
          KEYS=("mosdns_5" "v2dat_" "luci-app-mosdns_" "luci-i18n-mosdns" "v2ray-geoip" "v2ray-geosite")
          
          for key in "${KEYS[@]}"; do
            # 筛选 x86_64 或者 all 架构的包
            url=$(grep -o "https://github.com/[^\"]*${key}[^\"]*x86_64[^\"]*\.ipk" releases.json | head -1 || \
                  grep -o "https://github.com/[^\"]*${key}[^\"]*_all\.ipk" releases.json | head -1)
            
            if [ -n "$url" ]; then
              echo "Downloading: $url"
              wget -q "$url" -P mosdns_x86_64/
            fi
          done

      - name: Create install.sh
        run: |
          cat << 'EOF' > mosdns_x86_64/install.sh
          #!/bin/sh
          echo "正在更新软件包列表..."
          opkg update
          echo "正在安装 MosDNS 及相关组件..."
          opkg install --force-depends *.ipk
          echo "安装完成。"
          EOF
          chmod +x mosdns_x86_64/install.sh

      - name: Create .run package
        run: |
          git clone https://github.com/megastep/makeself.git
          ./makeself/makeself.sh mosdns_x86_64/ MosDNS_${{ env.LATEST_TAG }}_x86_64.run "MosDNS Installer" ./install.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.LATEST_TAG }}
          files: MosDNS_*.run
