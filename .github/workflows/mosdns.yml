name: Build MosDNS .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p mosdns-build
          git clone https://github.com/megastep/makeself.git

      - name: Download Files
        run: |
          # 1. 下载 sbwml 的 mosdns 压缩包
          echo "正在下载 MosDNS 压缩包..."
          # 自动获取最新发布的 tar.gz 链接
          URL=$(curl -s https://api.github.com/repos/sbwml/luci-app-mosdns/releases/latest | jq -r '.assets[] | select(.name | contains("x86_64-openwrt-24.10.tar.gz")) | .browser_download_url' | head -n 1)
          wget -q "$URL" -O mosdns.tar.gz
          
          # 2. 解压到构建目录
          tar -zxvf mosdns.tar.gz -C mosdns-build/
          # 如果解压后有多级目录，将其移动到顶层
          mv mosdns-build/usr/bin/mosdns mosdns-build/mosdns
          mv mosdns-build/usr/lib/lua/luci/controller/mosdns.lua mosdns-build/mosdns.lua 2>/dev/null || true

      - name: Create install.sh
        run: |
          cat << 'EOF' > mosdns-build/install.sh
          #!/bin/sh
          echo "===> 部署 MosDNS..."
          # 将解压后的文件同步到系统目录
          mkdir -p /usr/bin/mosdns
          cp mosdns /usr/bin/mosdns/
          chmod +x /usr/bin/mosdns/mosdns
          
          # 如果有 luci 界面文件，也需要放置到对应目录 (这里是一个通用的部署逻辑)
          mkdir -p /usr/lib/lua/luci/controller/
          [ -f "mosdns.lua" ] && cp mosdns.lua /usr/lib/lua/luci/controller/
          
          echo "===> 部署完成。"
          EOF
          chmod +x mosdns-build/install.sh

      - name: Create .run package
        run: |
          ./makeself/makeself.sh mosdns-build/ MosDNS_x86_64.run "MosDNS Installer" ./install.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "MosDNS-$(date +%Y%m%d-%H%M)"
          files: MosDNS_x86_64.run
