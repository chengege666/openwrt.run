name: Build MosDNS .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p mosdns-build
          git clone https://github.com/megastep/makeself.git

      - name: Download Files
        run: |
          # 1. 直接从 GitHub Release 下载预编译好的 IPK
          echo "正在下载 MosDNS 插件..."
          # 强制锁定下载路径，避开任何查找逻辑
          wget -q -O mosdns-build/luci-app-mosdns.ipk https://github.com/sbwml/luci-app-mosdns/releases/latest/download/luci-app-mosdns_all.ipk || \
          echo "无法通过 Release 下载，请确保该仓库有最新的 Release 文件"

          # 2. 下载 MosDNS 核心
          echo "正在下载 MosDNS 核心..."
          CORE_URL=$(curl -s https://api.github.com/repos/IrineSistiana/mosdns/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url' | head -n 1)
          wget -q "$CORE_URL" -O mosdns-core.tar.gz
          tar -zxvf mosdns-core.tar.gz -C mosdns-build/
          # 确保文件名统一
          [ -f "mosdns-build/mosdns" ] || mv mosdns-build/mosdns-v* mosdns-build/mosdns 2>/dev/null || true

      - name: Create install.sh
        run: |
          cat << 'EOF' > mosdns-build/install.sh
          #!/bin/sh
          echo "===> 安装 MosDNS..."
          opkg install --force-depends *.ipk
          
          mkdir -p /usr/bin/mosdns
          cp mosdns /usr/bin/mosdns/mosdns
          chmod +x /usr/bin/mosdns/mosdns
          echo "===> 安装完成。"
          EOF
          chmod +x mosdns-build/install.sh

      - name: Create .run package
        run: |
          ./makeself/makeself.sh mosdns-build/ MosDNS_x86_64.run "MosDNS Installer" ./install.sh

      - name: Set Tag Name
        run: echo "TAG_NAME=MosDNS-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "MosDNS Bundle ${{ env.TAG_NAME }}"
          files: MosDNS_x86_64.run
