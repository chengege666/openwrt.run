name: Build Argon Theme .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p argon-build
          git clone https://github.com/megastep/makeself.git

      - name: Download Argon Theme
        run: |
          echo "正在从 openwrt.ai 获取最新 Argon 主题..."
          BASE_URL="https://dl.openwrt.ai/packages-24.10/x86_64/kiddin9/"
          
          # 只抓取主题包，忽略配置插件
          THEME_IPK=$(curl -s $BASE_URL | grep -o 'luci-theme-argon_[^"]*\.ipk' | sort -V | tail -n 1)
          
          echo "下载清单: $THEME_IPK"
          wget -q "$BASE_URL$THEME_IPK" -P argon-build/

      - name: Create install.sh
        run: |
          cat << 'EOF' > argon-build/install.sh
          #!/bin/sh
          echo "===> 正在安装 Argon 主题..."
          # 强制安装
          opkg install --force-depends *.ipk
          echo "===> 安装完成！请在系统界面选择 argon 主题。"
          EOF
          chmod +x argon-build/install.sh

      - name: Create self-extracting .run package
        run: |
          ./makeself/makeself.sh argon-build/ Argon_Theme_Pure.run "Argon Theme Installer" ./install.sh

      - name: Set Tag Name
        run: echo "TAG_NAME=Argon-Pure-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Argon Theme Pure ${{ env.TAG_NAME }}"
          files: Argon_Theme_Pure.run
