name: Build Argon Theme .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p argon-build
          git clone https://github.com/megastep/makeself.git

      - name: Download Argon Theme
        run: |
          echo "正在从 openwrt.ai 获取最新 Argon 包..."
          BASE_URL="https://dl.openwrt.ai/packages-24.10/x86_64/kiddin9/"
          
          # 获取网页内容并自动搜索最新文件名
          # 1. 主题包
          THEME_IPK=$(curl -s $BASE_URL | grep -o 'luci-theme-argon_[^"]*\.ipk' | sort -V | tail -n 1)
          # 2. 配置界面
          CONFIG_IPK=$(curl -s $BASE_URL | grep -o 'luci-app-argon-config_[^"]*\.ipk' | sort -V | tail -n 1)
          # 3. 中文包
          ZH_IPK=$(curl -s $BASE_URL | grep -o 'luci-i18n-argon-config-zh-cn_[^"]*\.ipk' | sort -V | tail -n 1)
          
          echo "下载清单: $THEME_IPK, $CONFIG_IPK, $ZH_IPK"
          
          wget -q "$BASE_URL$THEME_IPK" -P argon-build/
          wget -q "$BASE_URL$CONFIG_IPK" -P argon-build/
          wget -q "$BASE_URL$ZH_IPK" -P argon-build/

      - name: Create install.sh
        run: |
          cat << 'EOF' > argon-build/install.sh
          #!/bin/sh
          echo "===> 正在安装 Argon 主题组件..."
          # 强制安装以跳过依赖检查
          opkg install --force-depends *.ipk
          echo "===> 安装完成！"
          EOF
          chmod +x argon-build/install.sh

      - name: Create self-extracting .run package
        run: |
          ./makeself/makeself.sh argon-build/ Argon_Theme_All.run "Argon Theme Installer" ./install.sh

      - name: Set Tag Name
        run: echo "TAG_NAME=Argon-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Argon Theme Bundle ${{ env.TAG_NAME }}"
          files: Argon_Theme_All.run
