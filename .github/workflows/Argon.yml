name: Build Argon Theme .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p argon-build
          git clone https://github.com/megastep/makeself.git

      - name: Download Argon Theme
        run: |
          wget -q https://github.com/jerrykuku/luci-theme-argon/releases/download/v2.3.1/luci-theme-argon_2.3.1_all.ipk -P argon-build/
          wget -q https://github.com/jerrykuku/luci-app-argon-config/releases/download/v0.9/luci-app-argon-config_0.9_all.ipk -P argon-build/

      - name: Create install.sh
        run: |
          cat << 'EOF' > argon-build/install.sh
          #!/bin/sh
          opkg install --force-depends *.ipk
          EOF
          chmod +x argon-build/install.sh

      - name: Create self-extracting .run package
        run: |
          ./makeself/makeself.sh argon-build/ Argon_Theme_All.run "Argon Theme Installer" ./install.sh

      # 修正点：先生成合法的 Tag 并存入环境变量
      - name: Set Tag Name
        run: echo "TAG_NAME=Argon-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Argon Theme Bundle ${{ env.TAG_NAME }}"
          files: Argon_Theme_All.run
