name: Build Argon Theme .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p argon-build
          git clone https://github.com/megastep/makeself.git

      - name: Download Argon Theme
        run: |
          echo "正在从 ImmortalWrt 官方源获取最新 Argon 主题..."
          BASE_URL="https://downloads.immortalwrt.org/releases/24.10/packages/x86_64/luci/"

          THEME_IPK=$(wget -qO- --timeout=15 "$BASE_URL" | grep -oP 'luci-theme-argon_[^"<]*\.ipk' | sort -V | tail -n 1)

          if [ -z "$THEME_IPK" ]; then
            echo "错误：未在官方源找到 luci-theme-argon"
            exit 1
          fi

          echo "下载: $THEME_IPK"
          wget -q --timeout=15 "$BASE_URL$THEME_IPK" -P argon-build/
          test -s argon-build/"$THEME_IPK"

      - name: Create install.sh
        run: |
          cat << 'EOF' > argon-build/install.sh
          #!/bin/sh
          echo "===> 正在安装 Argon 主题..."
          opkg install --force-depends *.ipk
          echo "===> 安装完成！请在系统界面选择 argon 主题。"
          EOF
          chmod +x argon-build/install.sh

      - name: Create self-extracting .run package
        run: |
          ./makeself/makeself.sh argon-build/ Argon_Theme_Pure.run "Argon Theme Installer" ./install.sh

      - name: Set Tag Name
        run: echo "TAG_NAME=argon-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Argon Theme ${{ env.TAG_NAME }}"
          files: Argon_Theme_Pure.run
