name: Build Argon（主题） .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p argon-build
          sudo apt-get update && sudo apt-get install -y jq
          git clone https://github.com/megastep/makeself.git

      - name: Download Argon Theme
        run: |
          echo "正在从 GitHub Releases 获取最新 Argon 主题..."
          RELEASES_JSON="$(curl -fsSL --connect-timeout 15 --max-time 30 https://api.github.com/repos/jerrykuku/luci-theme-argon/releases)"

          THEME_URL=""
          for tag in v2.4.3 v2.3.2 v1.8.4; do
            URL=$(echo "$RELEASES_JSON" | jq -r --arg t "$tag" '.[] | select(.tag_name == $t) | .assets[] | select(.name | endswith("_all.ipk")) | .browser_download_url' | head -1)
            if [ -n "$URL" ]; then
              THEME_URL="$URL"
              echo "找到 IPK 版本: $tag"
              break
            fi
          done

          if [ -z "$THEME_URL" ]; then
            echo "尝试从 releases 列表中搜索 IPK..."
            THEME_URL=$(echo "$RELEASES_JSON" | jq -r '.[].assets[] | select(.name | endswith("_all.ipk")) | .browser_download_url' | head -1)
          fi

          if [ -z "$THEME_URL" ]; then
            echo "错误：未在 GitHub Releases 中找到 luci-theme-argon 的 IPK 格式"
            exit 1
          fi

          echo "下载: $THEME_URL"
          curl -L --fail --connect-timeout 15 --max-time 60 "$THEME_URL" -o argon-build/luci-theme-argon.ipk -#
          test -s argon-build/luci-theme-argon.ipk

      - name: Create install.sh
        run: |
          cat << 'EOF' > argon-build/install.sh
          #!/bin/sh
          echo "===> 正在安装 Argon 主题..."
          opkg install --force-depends *.ipk
          echo "===> 安装完成！请在系统界面选择 argon 主题。"
          EOF
          chmod +x argon-build/install.sh

      - name: Create self-extracting .run package
        run: |
          ./makeself/makeself.sh argon-build/ Argon_Theme_Pure.run "Argon Theme Installer" ./install.sh

      - name: Set Tag Name
        run: echo "TAG_NAME=argon-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Argon Theme ${{ env.TAG_NAME }}"
          files: Argon_Theme_Pure.run
