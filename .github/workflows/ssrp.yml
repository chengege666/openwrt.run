name: Make SSR-Plus run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p x86_64/depends a53/depends
          wget -O x86_64/depends/libopenssl3.ipk https://github.com/wkccd/build/releases/download/pw1/libopenssl3_3.0.16-1_x86_64.ipk
          wget -O a53/depends/libopenssl3.ipk https://github.com/wkccd/build/releases/download/pw1/libopenssl3_3.0.16-1_aarch64_cortex-a53.ipk

      - name: Download ipk files
        run: |
          FILE_PREFIXES=("shadowsocks-libev-ss-server" "dns2tcp" "lua-neturl" "chinadns-ng" "dns2socks" "hysteria" "ipt2socks" "microsocks" "mosdns" "naiveproxy" "redsocks2" "shadowsocksr-libev" "shadowsocks-rust" "shadow-tls" "simple-obfs-client" "tcping" "trojan" "tuic-client" "v2ray-plugin" "xray-core" "luci-app-ssr-plus")
          EXCLUDE_PREFIXES=("luci-app-chinadns-ng" "luci-app-microsocks" "luci-app-mosdns" "luci-app-naiveproxy" "luci-app-redsocks2" "luci-app-shadowsocks")

          BASE_URL_X86="https://dl.openwrt.ai/packages-24.10/x86_64/kiddin9/"
          echo "Fetching x86 directory page from $BASE_URL_X86"
          wget -qO- "$BASE_URL_X86" | \
          while IFS= read -r LINE; do
              for PREFIX in "${FILE_PREFIXES[@]}"; do
                  if [[ "$LINE" == *"$PREFIX"* ]]; then
                      FILE=$(echo "$LINE" | grep -oP 'href="\K[^"]*')
                      if [[ -z "$FILE" ]]; then
                          continue
                      fi
                      exclude_file=false
                      for exclude_prefix in "${EXCLUDE_PREFIXES[@]}"; do
                          if [[ "$FILE" == $exclude_prefix* ]]; then
                              exclude_file=true
                              break
                          fi
                      done
                      if $exclude_file; then
                          echo "Skip file: $FILE"
                          continue
                      fi
                      FILE_URL="${BASE_URL_X86}${FILE}"
                      echo "Found file: $FILE_URL"
                      curl -L --fail "$FILE_URL" -o "x86_64/depends/$(basename $FILE_URL)" -#
                  fi
              done
          done

          BASE_URL_A53="https://dl.openwrt.ai/packages-24.10/aarch64_cortex-a53/kiddin9/"
          echo "Fetching a53 directory page from $BASE_URL_A53"
          wget -qO- "$BASE_URL_A53" | \
          while IFS= read -r LINE; do
              for PREFIX in "${FILE_PREFIXES[@]}"; do
                  if [[ "$LINE" == *"$PREFIX"* ]]; then
                      FILE=$(echo "$LINE" | grep -oP 'href="\K[^"]*')
                      if [[ -z "$FILE" ]]; then
                          continue
                      fi
                      exclude_file=false
                      for exclude_prefix in "${EXCLUDE_PREFIXES[@]}"; do
                          if [[ "$FILE" == $exclude_prefix* ]]; then
                              exclude_file=true
                              break
                          fi
                      done
                      if $exclude_file; then
                          echo "Skip file: $FILE"
                          continue
                      fi
                      FILE_URL="${BASE_URL_A53}${FILE}"
                      echo "Found file: $FILE_URL"
                      curl -L --fail "$FILE_URL" -o "a53/depends/$(basename $FILE_URL)" -#
                  fi
              done
          done

      - name: Download libudns
        run: |
          FILE_PREFIXES=("libudns")
          BASE_URL_X86="https://dl.openwrt.ai/packages-24.10/x86_64/packages/"
          wget -qO- "$BASE_URL_X86" | \
          while IFS= read -r LINE; do
              for PREFIX in "${FILE_PREFIXES[@]}"; do
                  if [[ "$LINE" == *"$PREFIX"* ]]; then
                      FILE=$(echo "$LINE" | grep -oP 'href="\K[^"]*')
                      if [[ -z "$FILE" ]]; then
                          continue
                      fi
                      FILE_URL="${BASE_URL_X86}${FILE}"
                      echo "Found file: $FILE_URL"
                      curl -L --fail "$FILE_URL" -o "x86_64/depends/$(basename $FILE_URL)" -#
                  fi
              done
          done
          BASE_URL_A53="https://dl.openwrt.ai/packages-24.10/aarch64_cortex-a53/packages/"
          wget -qO- "$BASE_URL_A53" | \
          while IFS= read -r LINE; do
              for PREFIX in "${FILE_PREFIXES[@]}"; do
                  if [[ "$LINE" == *"$PREFIX"* ]]; then
                      FILE=$(echo "$LINE" | grep -oP 'href="\K[^"]*')
                      if [[ -z "$FILE" ]]; then
                          continue
                      fi
                      FILE_URL="${BASE_URL_A53}${FILE}"
                      echo "Found file: $FILE_URL"
                      curl -L --fail "$FILE_URL" -o "a53/depends/$(basename $FILE_URL)" -#
                  fi
              done
          done

      - name: List and organize packages
        run: |
          echo "List x86 depends"
          ls -lh x86_64/depends/
          echo "List a53 depends"
          ls -lh a53/depends/
          mv x86_64/depends/luci-app-ssr-plus*.ipk x86_64/
          mv a53/depends/luci-app-ssr-plus*.ipk a53/
          echo "x86_64 dir:"
          ls x86_64/
          echo "a53 dir:"
          ls a53/

      - name: Parse version
        id: setver
        run: |
          for file in a53/luci-app-ssr-plus*.ipk; do
              base=${file##*/}
              tmp=${base#*_}
              tmp=${tmp%_all.ipk}
              version=${tmp/-/_}
              echo "version=$version" >> "$GITHUB_OUTPUT"
              echo "version=$version" >> $GITHUB_ENV
              echo "$version"
              break
          done

      - name: Create install.sh
        run: |
          cat << 'EOF' > x86_64/install.sh
          #!/bin/sh
          set -e
          echo "===> 正在更新软件源..."
          opkg update
          echo "===> 正在安装依赖包..."
          opkg install depends/*.ipk --force-depends
          echo "===> 正在安装 SSR-Plus 主程序..."
          opkg install *.ipk --force-depends
          echo "===> 安装完成！"
          EOF
          chmod +x x86_64/install.sh
          cp x86_64/install.sh a53/

      - name: Install makeself
        run: sudo apt-get update && sudo apt-get install -y makeself

      - name: Create .run packages
        run: |
          mkdir -p output
          makeself x86_64/ "output/ssrp_x86_64-${{ steps.setver.outputs.version }}.run" "SSR-Plus x86_64 Installer" ./install.sh
          makeself a53/ "output/ssrp_aarch64_cortex-a53-${{ steps.setver.outputs.version }}.run" "SSR-Plus a53 Installer" ./install.sh
          ls -lh output/

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## SSR-Plus .run
          
          一款功能强大的 OpenWrt 代理插件，支持多种代理协议和智能分流。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：OpenWrt 或 ImmortalWrt `23.05+`
          - **支持架构**：`x86_64`、`aarch64_cortex-a53`
          - **磁盘空间**：至少 50MB 可用空间
          - **权限要求**：root 权限
          
          ---
          
          ## 功能特性
          
          - **多协议支持**：支持 Shadowsocks、ShadowsocksR、V2Ray、Trojan、Hysteria、NaiveProxy 等协议
          - **智能分流**：支持规则分流和全局模式
          - **DNS 优化**：内置 DNS 优化和去污染功能
          - **Web 管理**：提供友好的 LuCI 管理界面
          - **完整依赖**：包含所有必需的依赖包
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          # x86_64 设备
          scp ssrp_x86_64-*.run root@192.168.1.1:/tmp/
          
          # aarch64 设备
          scp ssrp_aarch64_cortex-a53-*.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将对应的 `.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 IPK 包！
          
          **2. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **3. 添加执行权限**
          ```bash
          # x86_64 设备
          chmod +x ssrp_x86_64-*.run
          
          # aarch64 设备
          chmod +x ssrp_aarch64_cortex-a53-*.run
          ```
          
          **4. 执行安装**
          ```bash
          # x86_64 设备
          ./ssrp_x86_64-*.run
          
          # aarch64 设备
          ./ssrp_aarch64_cortex-a53-*.run
          ```
          
          **5. 等待安装完成**
          - 安装过程会自动解压并安装插件和依赖
          - 看到安装成功提示后继续下一步
          
          **6. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **服务** 菜单下找到 **SSR-Plus** 入口
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          opkg list-installed | grep ssr-plus
          ```
          
          **查看服务状态**：
          ```bash
          /etc/init.d/shadowsocksr status
          ```
          
          **访问界面**：
          - 在 LuCI 菜单中找到 **服务 -> SSR-Plus** 入口
          
          ---
          
          ## 使用方法
          
          **1. 打开 SSR-Plus 设置界面**
          - 登录 LuCI 管理界面
          - 找到 **服务 -> SSR-Plus** 菜单项
          
          **2. 基本配置**
          - **运行模式**：选择代理模式（gfwlist/全局/游戏模式）
          - **服务器设置**：添加代理服务器信息
          - **端口设置**：配置本地监听端口
          
          **3. 高级配置**
          - **DNS 设置**：配置 DNS 解析方式
          - **访问控制**：设置代理规则
          - **节点切换**：选择可用节点
          
          **4. 保存并应用**
          - 点击 **保存并应用**
          - 重启 SSR-Plus 服务使配置生效
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 界面没有 SSR-Plus 菜单？
          **A**: 这是 LuCI 缓存问题，请：
          1. 退出 LuCI 登录
          2. 清除浏览器缓存
          3. 重新登录即可
          
          ### Q2: 如何确认我的设备架构？
          **A**: 通过 SSH 执行以下命令：
          ```bash
          uname -m
          ```
          - 输出 `x86_64` 选择 x86_64 版本
          - 输出 `aarch64` 选择 aarch64 版本
          
          ### Q3: 代理不生效？
          **A**: 检查以下几点：
          1. 确认 SSR-Plus 服务已启动
          2. 检查防火墙规则是否正确
          3. 查看日志：`logread | grep shadowsocksr`
          
          ### Q4: 如何卸载 SSR-Plus？
          **A**: 
          ```bash
          opkg remove luci-app-ssr-plus
          ```
          
          ---
          
          ## 注意事项
          
          - **依赖完整**：安装包已包含所有必需依赖
          - **协议选择**：根据服务器支持选择合适协议
          - **资源占用**：代理工具会占用一定系统资源
          
          ENDOFFILE

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ssr-plus-${{ steps.setver.outputs.version }}
          name: SSRP-${{ steps.setver.outputs.version }}
          body_path: release_notes.md
          files: output/*.run
