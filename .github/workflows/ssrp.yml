name: Make SSR-Plus run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make-run:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install makeself
        run: sudo apt-get update && sudo apt-get install -y makeself curl

      - name: Download SSR-Plus packages
        run: |
          chmod +x shell/ssrp.sh
          ./shell/ssrp.sh

      - name: Copy install.sh
        run: |
          chmod +x shell/ssrp-install.sh
          cp shell/ssrp-install.sh x86_64/install.sh
          cp shell/ssrp-install.sh aarch64_generic/install.sh
          cp shell/ssrp-install.sh aarch64_cortex-a53/install.sh

      - name: Extract version and pack
        id: pack
        run: |
          mkdir -p output

          APP_IPK="$(ls aarch64_generic/luci-app-ssr-plus_*.ipk | head -n 1)"
          VERSION="$(basename "$APP_IPK" | sed -n 's/^luci-app-ssr-plus_\(.*\)_all\.ipk$/\1/p')"

          if [ -z "$VERSION" ]; then
            echo "无法提取版本号"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "$VERSION"

          for PLATFORM in x86_64 aarch64_generic aarch64_cortex-a53; do
            makeself "$PLATFORM" "output/luci-app-ssr-plus-${VERSION}_${PLATFORM}.run" \
              "ssr-plus ${PLATFORM} Installer v${VERSION}" ./install.sh
          done

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "ssr-plus-${{ steps.pack.outputs.version }}"
          name: "ssr-plus-${{ steps.pack.outputs.version }}"
          files: output/*.run
