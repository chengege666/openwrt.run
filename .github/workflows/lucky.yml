name: Build Lucky .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest stable version
        id: fetch_version
        run: |
          html=$(curl -sk "https://release.66666.host/")
          latest_stable=$(echo "$html" | grep -oP 'v\d+\.\d+\.\d+(?=/)' | grep -v beta | sort -V | tail -1)
          VERSION="${latest_stable#v}"
          echo "LATEST_TAG=$latest_stable" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Latest stable: $latest_stable"

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download lucky main program
        run: |
          echo "Downloading Lucky ${{ env.LATEST_TAG }}..."
          BASE_URL="https://release.66666.host/${{ env.LATEST_TAG }}/${{ env.VERSION }}_lucky"

          mkdir -p lucky_x86_64 lucky_aarch64

          curl --connect-timeout 30 -m 600 -kLo "lucky_x86_64/lucky.tar.gz" "${BASE_URL}/lucky_${{ env.VERSION }}_Linux_x86_64.tar.gz"
          curl --connect-timeout 30 -m 600 -kLo "lucky_aarch64/lucky.tar.gz" "${BASE_URL}/lucky_${{ env.VERSION }}_Linux_arm64.tar.gz"

          cd lucky_x86_64 && tar -xzf lucky.tar.gz && rm lucky.tar.gz && cd ..
          cd lucky_aarch64 && tar -xzf lucky.tar.gz && rm lucky.tar.gz && cd ..

          echo "Main program download completed."

      - name: Download LuCI packages from GitHub
        run: |
          echo "Downloading LuCI packages..."
          curl -sk "https://api.github.com/repos/gdy666/luci-app-lucky/releases/latest" > luci_releases.txt

          luci_app=$(grep "browser_download_url" luci_releases.txt | grep "luci-app-lucky_" | head -1 | awk -F '"' '{print $4}')
          luci_i18n=$(grep "browser_download_url" luci_releases.txt | grep "luci-i18n-lucky-zh-cn" | head -1 | awk -F '"' '{print $4}')

          curl --connect-timeout 30 -m 600 -kLo "lucky_x86_64/luci-app-lucky.ipk" "$luci_app"
          curl --connect-timeout 30 -m 600 -kLo "lucky_x86_64/luci-i18n-lucky-zh-cn.ipk" "$luci_i18n"
          cp lucky_x86_64/luci-app-lucky.ipk lucky_aarch64/
          cp lucky_x86_64/luci-i18n-lucky-zh-cn.ipk lucky_aarch64/

          echo "LuCI packages download completed."

      - name: Create install.sh
        run: |
          cat << 'EOF' > lucky_x86_64/install.sh
          #!/bin/sh
          INSTALL_DIR="/usr/local/lucky"
          INIT_SCRIPT="/etc/init.d/lucky"

          mkdir -p "$INSTALL_DIR"
          cp -f lucky "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/lucky"

          opkg update
          opkg install --force-depends luci-app-lucky.ipk luci-i18n-lucky-zh-cn.ipk

          echo '#!/bin/sh /etc/rc.common' > "$INIT_SCRIPT"
          echo 'START=99' >> "$INIT_SCRIPT"
          echo 'USE_PROCD=1' >> "$INIT_SCRIPT"
          echo 'PROG="'"$INSTALL_DIR"'/lucky"' >> "$INIT_SCRIPT"
          echo 'PIDFILE="/var/run/lucky.pid"' >> "$INIT_SCRIPT"
          echo '' >> "$INIT_SCRIPT"
          echo 'start_service() {' >> "$INIT_SCRIPT"
          echo '    procd_open_instance' >> "$INIT_SCRIPT"
          echo '    procd_set_param command "$PROG" -p 16601' >> "$INIT_SCRIPT"
          echo '    procd_set_param respawn ${respawn_threshold:-3600} ${respawn_timeout:-5} ${respawn_retry:-5}' >> "$INIT_SCRIPT"
          echo '    procd_set_param file /etc/lucky.conf' >> "$INIT_SCRIPT"
          echo '    procd_set_param stdout 1' >> "$INIT_SCRIPT"
          echo '    procd_set_param stderr 1' >> "$INIT_SCRIPT"
          echo '    procd_set_param pidfile "$PIDFILE"' >> "$INIT_SCRIPT"
          echo '    procd_close_instance' >> "$INIT_SCRIPT"
          echo '}' >> "$INIT_SCRIPT"
          echo '' >> "$INIT_SCRIPT"
          echo 'stop_service() {' >> "$INIT_SCRIPT"
          echo '    [ -f "$PIDFILE" ] && kill -9 $(cat "$PIDFILE") 2>/dev/null' >> "$INIT_SCRIPT"
          echo '    rm -f "$PIDFILE"' >> "$INIT_SCRIPT"
          echo '}' >> "$INIT_SCRIPT"
          echo '' >> "$INIT_SCRIPT"
          echo 'restart() {' >> "$INIT_SCRIPT"
          echo '    stop' >> "$INIT_SCRIPT"
          echo '    sleep 1' >> "$INIT_SCRIPT"
          echo '    start' >> "$INIT_SCRIPT"
          echo '}' >> "$INIT_SCRIPT"

          chmod +x "$INIT_SCRIPT"
          /etc/init.d/lucky enable
          /etc/init.d/lucky start

          echo "Lucky installed and service started."
          echo "Web UI: http://$(uci get network.lan.ipaddr 2>/dev/null || hostname -i):16601"
          EOF
          chmod +x lucky_x86_64/install.sh
          cp lucky_x86_64/install.sh lucky_aarch64/install.sh

      - name: Create self-extracting packages
        run: |
          mv lucky_x86_64 makeself/
          mv lucky_aarch64 makeself/
          cd makeself
          ./makeself.sh lucky_x86_64/ lucky_${{ env.VERSION }}_x86_64.run "Lucky Installer x86_64" ./install.sh
          ./makeself.sh lucky_aarch64/ lucky_${{ env.VERSION }}_aarch64.run "Lucky Installer aarch64" ./install.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: lucky-${{ env.VERSION }}
          name: "Lucky ${{ env.LATEST_TAG }}"
          files: makeself/lucky_*.run
