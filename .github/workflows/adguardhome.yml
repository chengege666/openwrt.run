name: Build AdGuardHome .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tags
        id: fetch_tags
        run: |
          ADG_TAG=$(curl -sk https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r '.tag_name')
          ADG_VERSION="${ADG_TAG#v}"
          echo "ADG_TAG=$ADG_TAG" >> $GITHUB_ENV
          echo "ADG_VERSION=$ADG_VERSION" >> $GITHUB_ENV

          LUCI_TAG=$(curl -sk https://api.github.com/repos/xptsp/luci-app-adguardhome/releases/latest | jq -r '.tag_name')
          LUCI_VERSION="${LUCI_TAG#v}"
          echo "LUCI_TAG=$LUCI_TAG" >> $GITHUB_ENV
          echo "LUCI_VERSION=$LUCI_VERSION" >> $GITHUB_ENV

          echo "AdGuardHome 版本: $ADG_VERSION"
          echo "LuCI 界面版本: $LUCI_VERSION"

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download packages
        run: |
          mkdir -p adg_x86_64 adg_aarch64

          echo "下载 AdGuardHome 二进制..."
          curl -sk "https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest" > adg_releases.txt

          ADG_AMD64_URL=$(grep "browser_download_url" adg_releases.txt | grep "AdGuardHome_linux_amd64.tar.gz" | awk -F '"' '{print $4}')
          ADG_ARM64_URL=$(grep "browser_download_url" adg_releases.txt | grep "AdGuardHome_linux_arm64.tar.gz" | awk -F '"' '{print $4}')

          echo "下载 LuCI 界面..."
          curl -sk "https://api.github.com/repos/xptsp/luci-app-adguardhome/releases/latest" > luci_releases.txt

          LUCI_IPK_URL=$(grep "browser_download_url" luci_releases.txt | grep "luci-app-adguardhome_.*_all.ipk" | awk -F '"' '{print $4}')
          LUCI_ZH_URL=$(grep "browser_download_url" luci_releases.txt | grep "luci-i18n-adguardhome-zh-cn_.*_all.ipk" | awk -F '"' '{print $4}')

          echo "下载 x86_64 二进制..."
          curl --connect-timeout 30 -m 600 -kLo "adg_x86_64/AdGuardHome_linux_amd64.tar.gz" "$ADG_AMD64_URL" &

          echo "下载 aarch64 二进制..."
          curl --connect-timeout 30 -m 600 -kLo "adg_aarch64/AdGuardHome_linux_arm64.tar.gz" "$ADG_ARM64_URL" &

          echo "下载 LuCI 包 (x86_64)..."
          curl --connect-timeout 30 -m 600 -kLo "adg_x86_64/luci-app-adguardhome.ipk" "$LUCI_IPK_URL" &
          [ -n "$LUCI_ZH_URL" ] && curl --connect-timeout 30 -m 600 -kLo "adg_x86_64/luci-i18n-adguardhome-zh-cn.ipk" "$LUCI_ZH_URL" &

          echo "下载 LuCI 包 (aarch64)..."
          curl --connect-timeout 30 -m 600 -kLo "adg_aarch64/luci-app-adguardhome.ipk" "$LUCI_IPK_URL" &
          [ -n "$LUCI_ZH_URL" ] && curl --connect-timeout 30 -m 600 -kLo "adg_aarch64/luci-i18n-adguardhome-zh-cn.ipk" "$LUCI_ZH_URL" &
          wait

          echo "解压二进制..."
          cd adg_x86_64 && tar -xzf AdGuardHome_linux_amd64.tar.gz && rm AdGuardHome_linux_amd64.tar.gz && cd ..
          cd adg_aarch64 && tar -xzf AdGuardHome_linux_arm64.tar.gz && rm AdGuardHome_linux_arm64.tar.gz && cd ..

          echo "文件信息:"
          ls -lh adg_x86_64/
          ls -lh adg_aarch64/

      - name: Create install.sh
        run: |
          cat > adg_x86_64/install.sh << 'EOF'
          #!/bin/sh
          echo "===> 安装 AdGuardHome + LuCI 界面"

          echo "===> 第一步: 安装 LuCI 界面"
          opkg update
          opkg install --force-depends luci-app-adguardhome.ipk
          [ -f luci-i18n-adguardhome-zh-cn.ipk ] && opkg install --force-depends luci-i18n-adguardhome-zh-cn.ipk

          echo "===> 第二步: 安装 AdGuardHome 二进制"
          mkdir -p /usr/bin
          cp AdGuardHome /usr/bin/AdGuardHome
          chmod +x /usr/bin/AdGuardHome

          echo "===> 第三步: 启动服务"
          /etc/init.d/AdGuardHome enable 2>/dev/null || true
          /etc/init.d/AdGuardHome start 2>/dev/null || true

          echo ""
          echo "============================================"
          echo "  安装完成！"
          echo ""
          echo "  LuCI 菜单: 服务 -> AdGuard Home"
          echo "  Web 界面: http://$(uci get network.lan.ipaddr 2>/dev/null || hostname -i):3000"
          echo ""
          echo "  首次访问请完成初始化设置。"
          echo "============================================"
          EOF

          chmod +x adg_x86_64/install.sh
          cp adg_x86_64/install.sh adg_aarch64/install.sh

      - name: Create self-extracting packages
        run: |
          mv adg_x86_64 makeself/
          mv adg_aarch64 makeself/
          cd makeself
          ./makeself.sh adg_x86_64/ AdGuardHome_${{ env.ADG_VERSION }}_x86_64.run "AdGuardHome Installer x86_64" ./install.sh
          ./makeself.sh adg_aarch64/ AdGuardHome_${{ env.ADG_VERSION }}_aarch64.run "AdGuardHome Installer aarch64" ./install.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: adguardhome-${{ env.ADG_VERSION }}
          name: "AdGuardHome ${{ env.ADG_TAG }} + LuCI"
          files: makeself/AdGuardHome_*.run
