name: Build AdGuardHome .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-22.04
    outputs:
      adg_version: ${{ steps.version.outputs.adg_version }}
      adg_tag: ${{ steps.version.outputs.adg_tag }}
    steps:
      - name: Fetch latest versions
        id: version
        run: |
          ADG_TAG=$(curl -sk https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r '.tag_name')
          ADG_VERSION="${ADG_TAG#v}"
          echo "adg_tag=$ADG_TAG" >> $GITHUB_OUTPUT
          echo "adg_version=$ADG_VERSION" >> $GITHUB_OUTPUT
          echo "AdGuardHome: $ADG_TAG"

  build:
    needs: get-version
    strategy:
      matrix:
        arch:
          - label: x86_64
            binary_suffix: linux_amd64
          - label: aarch64
            binary_suffix: linux_arm64
      fail-fast: false
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download packages
        run: |
          mkdir -p pkg

          ADG_RELEASES=$(curl -sk "https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest")
          ADG_URL=$(echo "$ADG_RELEASES" | jq -r '.assets[] | select(.name | test("AdGuardHome_${{ matrix.arch.binary_suffix }}.tar.gz")) | .browser_download_url' | head -1)
          echo "下载 AdGuardHome 二进制: $ADG_URL"
          curl -L --connect-timeout 30 -m 600 -kLo "pkg/AdGuardHome.tar.gz" "$ADG_URL"

          LUCI_RELEASES=$(curl -sk "https://api.github.com/repos/xptsp/luci-app-adguardhome/releases/latest")
          LUCI_URL=$(echo "$LUCI_RELEASES" | jq -r '.assets[] | select(.name | test("luci-app-adguardhome_.*_all.ipk")) | .browser_download_url' | head -1)
          LUCI_ZH_URL=$(echo "$LUCI_RELEASES" | jq -r '.assets[] | select(.name | test("luci-i18n-adguardhome-zh-cn_.*_all.ipk")) | .browser_download_url' | head -1)

          echo "下载 LuCI 界面..."
          curl -L --connect-timeout 30 -m 600 -kLo "pkg/luci-app-adguardhome.ipk" "$LUCI_URL"
          [ -n "$LUCI_ZH_URL" ] && [ "$LUCI_ZH_URL" != "null" ] && curl -L --connect-timeout 30 -m 600 -kLo "pkg/luci-i18n-adguardhome-zh-cn.ipk" "$LUCI_ZH_URL"

          echo "解压二进制..."
          cd pkg && tar -xzf AdGuardHome.tar.gz && rm AdGuardHome.tar.gz && cd ..

          echo "文件信息:"
          ls -lh pkg/

      - name: Create install.sh
        run: |
          cat > pkg/install.sh << 'INSTALLEOF'
          #!/bin/sh

          echo "===> 安装 AdGuardHome + LuCI 界面"

          echo "===> 第一步: 安装 LuCI 界面"
          opkg install --force-depends luci-app-adguardhome.ipk
          if [ -f luci-i18n-adguardhome-zh-cn.ipk ]; then
            opkg install --force-depends luci-i18n-adguardhome-zh-cn.ipk
          fi

          echo "===> 第二步: 安装 AdGuardHome 二进制"
          mkdir -p /usr/bin
          cp AdGuardHome /usr/bin/AdGuardHome
          chmod +x /usr/bin/AdGuardHome

          echo "===> 第三步: 创建 procd 服务"
          cat << 'SVC' > /etc/init.d/AdGuardHome
          #!/bin/sh /etc/rc.common
          START=95
          USE_PROCD=1
          PROG=/usr/bin/AdGuardHome

          start_service() {
            procd_open_instance
            procd_set_param command $PROG -c /etc/AdGuardHome/AdGuardHome.yaml -w /etc/AdGuardHome --no-check-update
            procd_set_param respawn
            procd_close_instance
          }

          stop_service() {
            service_stop $PROG
          }
          SVC

          chmod +x /etc/init.d/AdGuardHome
          /etc/init.d/AdGuardHome enable
          /etc/init.d/AdGuardHome start 2>/dev/null || true

          echo "===> 第四步: 刷新 LuCI 缓存"
          rm -rf /tmp/luci-modulecache /tmp/luci-indexcache
          /etc/init.d/rpcd restart 2>/dev/null || true
          /etc/init.d/uhttpd restart 2>/dev/null || /etc/init.d/nginx restart 2>/dev/null || true

          echo ""
          echo "============================================"
          echo "  安装完成！"
          echo ""
          echo "  LuCI 菜单: 服务 -> AdGuard Home"
          echo "  Web 界面: http://$(uci get network.lan.ipaddr 2>/dev/null || hostname -i):3000"
          echo ""
          echo "  首次访问请完成初始化设置。"
          echo "============================================"
          INSTALLEOF

          chmod +x pkg/install.sh

      - name: Create self-extracting package
        run: |
          mkdir -p makeself/pkg
          mv pkg/* makeself/pkg/
          cd makeself
          ./makeself.sh pkg/ AdGuardHome_${{ needs.get-version.outputs.adg_version }}_${{ matrix.arch.label }}.run \
            "AdGuardHome ${{ needs.get-version.outputs.adg_tag }} + LuCI - ${{ matrix.arch.label }}" ./install.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adguardhome-${{ matrix.arch.label }}
          path: makeself/AdGuardHome_*.run

  release:
    needs: [get-version, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: adguardhome-*
          merge-multiple: true

      - name: List files
        run: ls -lh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: adguardhome-${{ needs.get-version.outputs.adg_version }}
          name: "AdGuardHome ${{ needs.get-version.outputs.adg_tag }} + LuCI"
          body: |
            ## AdGuardHome ${{ needs.get-version.outputs.adg_tag }} + LuCI 界面

            包含组件:
            - **AdGuardHome** ${{ needs.get-version.outputs.adg_tag }} (DNS 广告过滤)
            - **luci-app-adguardhome** (LuCI 管理界面)

            支持架构: x86_64 / aarch64 (arm64)

            ### 安装方式

            ```bash
            cd /tmp
            chmod +x AdGuardHome_*.run
            ./AdGuardHome_*.run
            ```

            安装后 LuCI 菜单: **服务 -> AdGuard Home**
          files: AdGuardHome_*.run
