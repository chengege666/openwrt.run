name: Build AdGuardHome Run Package (LuCI)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_version:
        description: '强制指定版本（留空则自动获取最新）'
        required: false
        default: ''

jobs:
  check-version:
    name: 获取最新版本
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_build: ${{ steps.check_release.outputs.should_build }}
    steps:
      - name: 获取最新 Release 版本
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.force_version }}" ]; then
            VERSION="${{ github.event.inputs.force_version }}"
          else
            VERSION=$(curl -fsSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest \
              | jq -r '.tag_name')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ 目标版本：${VERSION}"

      - name: 检查是否已发布过该版本
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          STATUS=$(curl -fsSL -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${VERSION}" || true)
          if [ "$STATUS" = "200" ] && [ "${{ github.event.inputs.force_version }}" = "" ]; then
            echo "⏭️ 版本 ${VERSION} 已构建，跳过。"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "🔨 开始构建版本 ${VERSION}"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    name: 构建 ${{ matrix.arch }}
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            upstream_suffix: linux_amd64
          - arch: aarch64
            upstream_suffix: linux_arm64

    steps:
      # ── 1. 下载 AdGuardHome 官方二进制 ──────────────────────────────────
      - name: 下载 AdGuardHome 二进制
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          FILENAME="AdGuardHome_${{ matrix.upstream_suffix }}.tar.gz"
          URL="https://github.com/AdguardTeam/AdGuardHome/releases/download/${VERSION}/${FILENAME}"
          echo "⬇️ 下载：${URL}"
          curl -fsSL -o "${FILENAME}" "${URL}"
          tar -xzf "${FILENAME}"
          mv AdGuardHome/AdGuardHome ./AdGuardHome_bin
          chmod +x ./AdGuardHome_bin

      # ── 2. 拉取 luci-app-adguardhome 源码 ──────────────────────────────
      - name: 克隆 luci-app-adguardhome
        run: |
          git clone --depth=1 \
            https://github.com/rufengsuixing/luci-app-adguardhome.git \
            luci-src
          echo "✅ LuCI 源码获取完成"
          ls luci-src/

      # ── 3. 生成 install.sh ──────────────────────────────────────────────
      - name: 生成 install.sh
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          cat > install.sh << 'SCRIPT'
          #!/bin/sh
          set -e

          VERSION="__VERSION__"
          BINARY_DEST="/usr/bin/AdGuardHome"
          INIT_SCRIPT="/etc/init.d/AdGuardHome"
          WORK_DIR="/etc/AdGuardHome"
          UCI_CONF="/etc/config/AdGuardHome"

          echo ""
          echo "=================================================="
          echo "  AdGuardHome ${VERSION} for OpenWrt - 安装程序"
          echo "=================================================="
          echo ""

          # ── Step 1: 安装主程序二进制 ──────────────────────────
          echo "[1/5] 安装主程序..."
          cp -f AdGuardHome_bin "${BINARY_DEST}"
          chmod +x "${BINARY_DEST}"
          mkdir -p "${WORK_DIR}"

          # ── Step 2: 安装 procd 启动脚本 ───────────────────────
          echo "[2/5] 安装 procd 启动脚本..."
          cat > "${INIT_SCRIPT}" << 'INITEOF'
          #!/bin/sh /etc/rc.common
          USE_PROCD=1
          START=99
          STOP=01

          NAME="AdGuardHome"
          PROG="/usr/bin/AdGuardHome"
          WORK_DIR="/etc/AdGuardHome"

          start_service() {
              config_load AdGuardHome
              local enabled port
              config_get_bool enabled "config" "enabled" 0
              [ "$enabled" = "0" ] && { echo "AdGuardHome 未启用，跳过启动"; return; }
              config_get port "config" "port" "3000"

              procd_open_instance
              procd_set_param command "$PROG" \
                  --work-dir "$WORK_DIR" \
                  --no-check-update \
                  --web-addr "0.0.0.0:${port}"
              procd_set_param respawn
              procd_set_param stdout 1
              procd_set_param stderr 1
              procd_close_instance
          }
          INITEOF
          chmod +x "${INIT_SCRIPT}"

          # ── Step 3: 初始化 UCI 配置 ───────────────────────────
          echo "[3/5] 初始化 UCI 配置..."
          if [ ! -f "${UCI_CONF}" ]; then
            cat > "${UCI_CONF}" << 'UCIEOF'
          config AdGuardHome config
                  option enabled '0'
                  option port '3000'
                  option redirect 'dnsmasq-upstream'
          UCIEOF
          fi

          # ── Step 4: 安装 LuCI 文件 ────────────────────────────
          echo "[4/5] 安装 LuCI 界面..."

          # 控制器
          mkdir -p /usr/lib/lua/luci/controller
          cp -f luci/controller/adguardhome.lua \
                /usr/lib/lua/luci/controller/adguardhome.lua

          # CBI 模型
          mkdir -p /usr/lib/lua/luci/model/cbi
          cp -f luci/model/cbi/adguardhome.lua \
                /usr/lib/lua/luci/model/cbi/adguardhome.lua

          # 静态资源（如果有）
          if [ -d luci/htdocs ]; then
            cp -rf luci/htdocs/. /www/
          fi

          # i18n 翻译文件（中文）
          if [ -d luci/i18n ]; then
            mkdir -p /usr/lib/lua/luci/i18n
            cp -f luci/i18n/adguardhome.zh-cn.lmo \
                  /usr/lib/lua/luci/i18n/ 2>/dev/null || true
          fi

          # ── Step 5: 刷新 LuCI 缓存并启用服务 ─────────────────
          echo "[5/5] 刷新 LuCI 缓存，启用服务..."
          rm -rf /tmp/luci-indexcache /tmp/luci-modulecache /tmp/luci-*
          "${INIT_SCRIPT}" enable

          echo ""
          echo "✅ 安装完成！"
          echo ""
          echo "   👉 请到 LuCI → 服务 → AdGuardHome 中启用并配置"
          echo "   👉 首次启动后访问 http://<设备IP>:3000 完成向导"
          echo ""
          SCRIPT

          # 替换版本占位符
          sed -i "s/__VERSION__/${VERSION}/g" install.sh
          chmod +x install.sh

      # ── 4. 整理 LuCI 源文件到打包目录 ──────────────────────────────────
      - name: 整理 LuCI 文件
        run: |
          mkdir -p pkg/luci/controller
          mkdir -p pkg/luci/model/cbi
          mkdir -p pkg/luci/i18n

          # 控制器
          cp luci-src/luasrc/controller/adguardhome.lua \
             pkg/luci/controller/adguardhome.lua 2>/dev/null || \
          cp luci-src/luasrc/controller/*.lua \
             pkg/luci/controller/ 2>/dev/null || true

          # CBI 模型
          cp luci-src/luasrc/model/cbi/adguardhome.lua \
             pkg/luci/model/cbi/adguardhome.lua 2>/dev/null || \
          cp luci-src/luasrc/model/cbi/*.lua \
             pkg/luci/model/cbi/ 2>/dev/null || true

          # 静态资源
          if [ -d luci-src/htdocs ]; then
            cp -r luci-src/htdocs pkg/luci/htdocs
          fi

          # i18n（lmo 编译文件或 po 源文件）
          find luci-src -name "*.lmo" -exec cp {} pkg/luci/i18n/ \; 2>/dev/null || true
          find luci-src -name "*.po"  -exec cp {} pkg/luci/i18n/ \; 2>/dev/null || true

          echo "📦 LuCI 文件整理完成："
          find pkg/luci -type f

      # ── 5. 用 makeself 打包 ─────────────────────────────────────────────
      - name: 打包 .run
        run: |
          sudo apt-get install -y makeself
          VERSION="${{ needs.check-version.outputs.version }}"
          VER="${VERSION#v}"
          OUTPUT="AdGuardHome_${VER}_${{ matrix.arch }}.run"

          # 最终打包目录结构：
          #   pkg/
          #   ├── AdGuardHome_bin       主程序
          #   ├── install.sh            安装脚本
          #   └── luci/                 LuCI 文件
          #       ├── controller/
          #       ├── model/cbi/
          #       └── i18n/
          cp AdGuardHome_bin pkg/
          cp install.sh pkg/

          makeself \
            --sha256 \
            --needroot \
            pkg \
            "${OUTPUT}" \
            "AdGuardHome ${VERSION} + LuCI for OpenWrt (${{ matrix.arch }})" \
            ./install.sh

          echo "✅ 打包完成：${OUTPUT}"
          ls -lh "${OUTPUT}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: adguardhome-${{ matrix.arch }}
          path: AdGuardHome_*.run
          retention-days: 7

  release:
    name: 发布 Release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: adguardhome-*
          merge-multiple: true
          path: dist/

      - name: 创建 GitHub Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: "AdGuardHome ${{ needs.check-version.outputs.version }} + LuCI"
          body: |
            ## AdGuardHome ${{ needs.check-version.outputs.version }} for OpenWrt（含 LuCI 界面）

            自动构建，包含：
            - ✅ AdGuardHome 官方预编译二进制
            - ✅ procd 启动脚本（支持 UCI 配置）
            - ✅ LuCI 管理界面（服务 → AdGuardHome）

            ### 安装方法

            ```sh
            # 上传 .run 到路由器后执行（需要 root）
            chmod +x AdGuardHome_*_x86_64.run
            ./AdGuardHome_*_x86_64.run
            ```

            安装后在 LuCI → **服务 → AdGuardHome** 中启用，首次启动后访问 `:3000` 完成向导。

            ### 上游来源
            - AdGuardHome: https://github.com/AdguardTeam/AdGuardHome/releases/tag/${{ needs.check-version.outputs.version }}
            - LuCI App: https://github.com/rufengsuixing/luci-app-adguardhome
          files: dist/*.run
          draft: false
          prerelease: false