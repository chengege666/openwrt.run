name: Make AdGuardHome run files

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'OpenWrt 版本 (packages-23.05 / packages-24.10)'
        required: false
        default: 'packages-24.10'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set PACKAGE_VERSION
        run: |
          package_version="${{ github.event.inputs.package_version }}"
          if [ -z "$package_version" ]; then
            package_version="packages-24.10"
          fi
          echo "PACKAGE_VERSION=$package_version" >> $GITHUB_ENV

      - name: Fetch latest release tag from AdGuardHome
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r '.tag_name')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
          echo "版本: $latest_tag"

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download AdGuardHome binaries
        run: |
          echo "下载 AdGuardHome ${{ env.LATEST_TAG }} 各架构二进制..."
          curl -LO "https://github.com/AdguardTeam/AdGuardHome/releases/download/${{ env.LATEST_TAG }}/AdGuardHome_linux_amd64.tar.gz"
          tar --one-top-level=AdGuardHome_x86_64 -xzf AdGuardHome_linux_amd64.tar.gz
          rm AdGuardHome_linux_amd64.tar.gz

          curl -LO "https://github.com/AdguardTeam/AdGuardHome/releases/download/${{ env.LATEST_TAG }}/AdGuardHome_linux_arm64.tar.gz"
          tar --one-top-level=AdGuardHome_aarch64 -xzf AdGuardHome_linux_arm64.tar.gz
          rm AdGuardHome_linux_arm64.tar.gz

          echo "x86_64 文件:"
          ls AdGuardHome_x86_64
          echo "aarch64 文件:"
          ls AdGuardHome_aarch64

      - name: Download luci-app-adguardhome IPK from kiddin9 feed
        run: |
          BASE_URL="https://dl.openwrt.ai/${{ env.PACKAGE_VERSION }}"
          ARCH_LIST="x86_64 aarch64_cortex-a53"

          for ARCH in $ARCH_LIST; do
            DIR=""
            case "$ARCH" in
              x86_64) DIR="AdGuardHome_x86_64" ;;
              aarch64_cortex-a53) DIR="AdGuardHome_aarch64" ;;
            esac

            echo "从 $ARCH feed 获取 luci-app-adguardhome..."
            FEED_URL="${BASE_URL}/${ARCH}/kiddin9/"
            INDEX_HTML=$(wget -qO- --timeout=15 "${FEED_URL}/")
            IPK_FILE=$(echo "$INDEX_HTML" | grep -oP 'luci-app-adguardhome_[^"< ]*_all\.ipk' | sort -V | tail -1)

            if [ -n "$IPK_FILE" ]; then
              echo "找到: $IPK_FILE"
              wget -q --timeout=30 -O "${DIR}/luci-app-adguardhome_all.ipk" "${FEED_URL}${IPK_FILE}"
              test -s "${DIR}/luci-app-adguardhome_all.ipk" && echo "下载成功" || echo "下载失败"
            else
              echo "错误: 未找到 luci-app-adguardhome IPK"
              exit 1
            fi
            ls -lh "${DIR}/luci-app-adguardhome_all.ipk"
          done

      - name: Create install.sh scripts
        run: |
          cat << 'EOF' > AdGuardHome_x86_64/install.sh
          #!/bin/sh
          echo "===> 更新软件源..."
          opkg update || { echo "update failed"; exit 1; }

          echo "===> 安装 luci-app-adguardhome"
          opkg install luci-app-adguardhome_all.ipk || { echo "安装失败"; exit 1; }

          echo "===> 更新 AdGuardHome 核心"
          cp AdGuardHome/AdGuardHome /usr/bin/AdGuardHome
          chmod +x /usr/bin/AdGuardHome

          echo "===> 刷新 LuCI 缓存"
          rm -rf /tmp/luci-modulecache /tmp/luci-indexcache
          /etc/init.d/rpcd restart 2>/dev/null || true
          /etc/init.d/uhttpd restart 2>/dev/null || /etc/init.d/nginx restart 2>/dev/null || true

          echo ""
          echo "============================================"
          echo "  安装完成！"
          echo ""
          echo "  LuCI 菜单: 服务 -> AdGuard Home"
          echo "  Web 界面: http://$(uci get network.lan.ipaddr 2>/dev/null || hostname -i):3000"
          echo ""
          echo "  首次访问请完成初始化设置。"
          echo "============================================"
          EOF

          chmod +x AdGuardHome_x86_64/install.sh
          cp AdGuardHome_x86_64/install.sh AdGuardHome_aarch64/install.sh

      - name: Move to makeself
        run: |
          mv AdGuardHome_x86_64 makeself/
          mv AdGuardHome_aarch64 makeself/

      - name: Create self-extracting packages
        run: |
          cd makeself
          ./makeself.sh AdGuardHome_x86_64/ AdGuardHome_${{ env.LATEST_TAG }}_x86_64.run \
            "AdGuardHome ${{ env.LATEST_TAG }} Installer x86_64" ./install.sh
          ./makeself.sh AdGuardHome_aarch64/ AdGuardHome_${{ env.LATEST_TAG }}_aarch64.run \
            "AdGuardHome ${{ env.LATEST_TAG }} Installer aarch64" ./install.sh

      - name: Check file sizes
        run: ls -lh makeself/AdGuardHome_*.run

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: AdGuardHome_${{ env.LATEST_TAG }}
          name: "AdGuardHome-${{ env.LATEST_TAG }}"
          body: |
            ## AdGuardHome ${{ env.LATEST_TAG }}

            包含:
            - **AdGuardHome** ${{ env.LATEST_TAG }} (DNS 广告过滤核心)
            - **luci-app-adguardhome** (OpenWrt 官方 LuCI 界面)
            - 来源: kiddin9 feed (${{ env.PACKAGE_VERSION }})

            支持架构: x86_64 / aarch64 (arm64)

            ### 安装方式

            ```bash
            cd /tmp
            chmod +x AdGuardHome_*.run
            ./AdGuardHome_*.run
            ```

            安装后 LuCI 菜单: **服务 -> AdGuard Home**
          files: makeself/AdGuardHome_*.run
