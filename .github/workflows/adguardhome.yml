name: Make AdGuardHome run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download luci-app-adguardhome IPK from rufengsuixing
        run: |
          mkdir -p pkg
          echo "从 rufengsuixing/luci-app-adguardhome 获取最新 LuCI 界面..."
          LUCI_RELEASES=$(curl -sk "https://api.github.com/repos/rufengsuixing/luci-app-adguardhome/releases/latest")
          LUCI_TAG=$(echo "$LUCI_RELEASES" | jq -r '.tag_name')
          LUCI_URL=$(echo "$LUCI_RELEASES" | jq -r '.assets[] | select(.name | test("luci-app-adguardhome_.*_all.ipk")) | .browser_download_url' | head -1)

          echo "LuCI 版本: $LUCI_TAG"
          echo "下载: $LUCI_URL"

          curl -L --connect-timeout 30 -m 600 -kLo "pkg/luci-app-adguardhome_all.ipk" "$LUCI_URL"
          ls -lh pkg/
          file pkg/luci-app-adguardhome_all.ipk

      - name: Create install.sh
        run: |
          cat << 'EOF' > pkg/install.sh
          #!/bin/sh
          echo "===> 安装 luci-app-adguardhome"
          opkg update
          opkg install --force-depends luci-app-adguardhome_all.ipk

          echo "===> 刷新 LuCI 缓存"
          rm -rf /tmp/luci-modulecache /tmp/luci-indexcache /tmp/luci-*
          /etc/init.d/rpcd restart 2>/dev/null || true
          /etc/init.d/uhttpd restart 2>/dev/null || /etc/init.d/nginx restart 2>/dev/null || true

          echo ""
          echo "============================================"
          echo "  安装完成！"
          echo ""
          echo "  在 LuCI 菜单中查找 AdGuard Home："
          echo "  如果使用 Argon 主题，菜单位于 服务 -> AdGuard Home"
          echo "  如果使用其他主题，可能在 系统 -> AdGuard Home"
          echo ""
          echo "  如未找到菜单，请退出登录后重新进入 LuCI。"
          echo "============================================"
          EOF
          chmod +x pkg/install.sh

      - name: Create self-extracting package
        run: |
          mv pkg makeself/
          cd makeself
          ./makeself.sh pkg/ AdGuardHome_LuCI_Installer.run \
            "luci-app-adguardhome by rufengsuixing" ./install.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: AdGuardHome_LuCI_Installer
          name: "AdGuardHome LuCI 界面 (rufengsuixing)"
          body: |
            ## AdGuardHome LuCI 界面 (rufengsuixing)

            仅包含 **luci-app-adguardhome**（LuCI 管理界面），不包含 AdGuardHome 核心。

            ### 安装方式

            ```bash
            cd /tmp
            chmod +x AdGuardHome_LuCI_Installer.run
            ./AdGuardHome_LuCI_Installer.run
            ```

            ### 核心升级

            安装 LoCI 后，打开 LuCI 菜单 -> 服务/系统 -> AdGuard Home，界面内有**在线下载核心**功能。
            也可以手动下载：
            - https://github.com/AdguardTeam/AdGuardHome/releases
          files: makeself/AdGuardHome_LuCI_Installer.run
