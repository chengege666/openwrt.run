name: Make AdGuardHome run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tag from AdGuardHome
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r '.tag_name')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
          echo "版本: $latest_tag"

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Setup directories
        run: |
          mkdir -p AdGuardHome_x86_64 AdGuardHome_aarch64

      - name: Download luci-app-adguardhome IPK from GitHub Releases
        run: |
          echo "从 rufengsuixing/luci-app-adguardhome 获取最新 LuCI 界面..."
          LUCI_RELEASES=$(curl -sk "https://api.github.com/repos/rufengsuixing/luci-app-adguardhome/releases/latest")
          LUCI_TAG=$(echo "$LUCI_RELEASES" | jq -r '.tag_name')
          LUCI_URL=$(echo "$LUCI_RELEASES" | jq -r '.assets[] | select(.name | test("luci-app-adguardhome_.*_all.ipk")) | .browser_download_url' | head -1)

          echo "LuCI 版本: $LUCI_TAG"
          echo "下载: $LUCI_URL"

          curl -L --connect-timeout 30 -m 600 -kLo "AdGuardHome_x86_64/luci-app-adguardhome_all.ipk" "$LUCI_URL"
          cp "AdGuardHome_x86_64/luci-app-adguardhome_all.ipk" "AdGuardHome_aarch64/luci-app-adguardhome_all.ipk"

          file AdGuardHome_x86_64/luci-app-adguardhome_all.ipk

      - name: Create install.sh scripts
        run: |
          cat << 'EOF' > AdGuardHome_x86_64/install.sh
          #!/bin/sh
          echo "===> 安装 luci-app-adguardhome"
          opkg update
          opkg install --force-depends luci-app-adguardhome_all.ipk

          echo "===> 刷新 LuCI 缓存"
          rm -rf /tmp/luci-modulecache /tmp/luci-indexcache
          /etc/init.d/rpcd restart 2>/dev/null || true
          /etc/init.d/uhttpd restart 2>/dev/null || /etc/init.d/nginx restart 2>/dev/null || true

          echo ""
          echo "============================================"
          echo "  安装完成！"
          echo ""
          echo "  LuCI 菜单: 服务 -> AdGuard Home"
          echo ""
          echo "  核心升级链接（自行下载更新）:"
          echo "  x86_64:"
          echo "    https://github.com/AdguardTeam/AdGuardHome/releases/download/${Cloud_Version}/AdGuardHome_linux_amd64.tar.gz"
          echo "  aarch64:"
          echo "    https://github.com/AdguardTeam/AdGuardHome/releases/download/${Cloud_Version}/AdGuardHome_linux_arm64.tar.gz"
          echo "============================================"
          EOF

          chmod +x AdGuardHome_x86_64/install.sh
          cp AdGuardHome_x86_64/install.sh AdGuardHome_aarch64/install.sh

      - name: Move to makeself
        run: |
          mv AdGuardHome_x86_64 makeself/
          mv AdGuardHome_aarch64 makeself/

      - name: Create self-extracting packages
        run: |
          cd makeself
          ./makeself.sh AdGuardHome_x86_64/ AdGuardHome_LuCI_${{ env.LATEST_TAG }}_x86_64.run \
            "AdGuardHome LuCI Installer x86_64" ./install.sh
          ./makeself.sh AdGuardHome_aarch64/ AdGuardHome_LuCI_${{ env.LATEST_TAG }}_aarch64.run \
            "AdGuardHome LuCI Installer aarch64" ./install.sh

      - name: Check file sizes
        run: ls -lh makeself/AdGuardHome_LuCI_*.run

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: AdGuardHome_LuCI_${{ env.LATEST_TAG }}
          name: "AdGuardHome LuCI-${{ env.LATEST_TAG }}"
          body: |
            ## AdGuardHome LuCI 界面 (${{ env.LATEST_TAG }})

            仅包含 **luci-app-adguardhome**（LuCI 管理界面），不包含 AdGuardHome 核心。

            ### 安装方式

            ```bash
            cd /tmp
            chmod +x AdGuardHome_LuCI_*.run
            ./AdGuardHome_LuCI_*.run
            ```

            ### 核心升级

            安装后请自行下载对应架构的核心：

            **x86_64:**
            ```
            https://github.com/AdguardTeam/AdGuardHome/releases/download/${Cloud_Version}/AdGuardHome_linux_amd64.tar.gz
            ```

            **aarch64:**
            ```
            https://github.com/AdguardTeam/AdGuardHome/releases/download/${Cloud_Version}/AdGuardHome_linux_arm64.tar.gz
            ```

            > `${Cloud_Version}` 替换为版本号，例如 `v0.107.74`
          files: makeself/AdGuardHome_LuCI_*.run
