name: Build AdGuardHome .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tag
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r '.tag_name')
          VERSION="${latest_tag#v}"
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "版本: $VERSION"

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download AdGuardHome binaries
        run: |
          echo "下载 AdGuardHome ${{ env.LATEST_TAG }}..."
          curl -sk "https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest" > releases.txt

          mkdir -p adg_x86_64 adg_aarch64

          download_file() {
            local url=$1
            local output_dir=$2
            [ -z "$url" ] && return
            local filename=$(basename "$url")
            echo "下载 $filename 到 $output_dir..."
            curl --connect-timeout 30 -m 600 -kLo "$output_dir/$filename" "$url"
          }

          ADG_AMD64_URL=$(grep "browser_download_url" releases.txt | grep "AdGuardHome_linux_amd64.tar.gz" | awk -F '"' '{print $4}')
          ADG_ARM64_URL=$(grep "browser_download_url" releases.txt | grep "AdGuardHome_linux_arm64.tar.gz" | awk -F '"' '{print $4}')

          download_file "$ADG_AMD64_URL" "adg_x86_64" &
          download_file "$ADG_ARM64_URL" "adg_aarch64" &
          wait

          echo "解压..."
          cd adg_x86_64 && tar -xzf *.tar.gz && rm *.tar.gz && cd ..
          cd adg_aarch64 && tar -xzf *.tar.gz && rm *.tar.gz && cd ..

          echo "文件信息:"
          ls -lh adg_x86_64/
          ls -lh adg_aarch64/

      - name: Create install.sh
        run: |
          VERSION="${{ env.VERSION }}"
          cat << ENDOFFILE > adg_x86_64/install.sh
          #!/bin/sh
          echo "===> 安装 AdGuardHome ${VERSION}"

          mkdir -p /usr/bin /etc/AdGuardHome /etc/init.d

          cp AdGuardHome /usr/bin/AdGuardHome
          chmod +x /usr/bin/AdGuardHome

          cat << 'SVC' > /etc/init.d/AdGuardHome
          #!/bin/sh /etc/rc.common
          START=95
          USE_PROCD=1
          PROG=/usr/bin/AdGuardHome

          start_service() {
            procd_open_instance
            procd_set_param command \$PROG -c /etc/AdGuardHome/AdGuardHome.yaml -w /etc/AdGuardHome --no-check-update
            procd_set_param respawn
            procd_close_instance
          }

          stop_service() {
            service_stop \$PROG
          }
          SVC

          chmod +x /etc/init.d/AdGuardHome
          /etc/init.d/AdGuardHome enable
          /etc/init.d/AdGuardHome start 2>/dev/null || true

          echo "===> 安装完成！"
          echo "Web 管理界面: http://\$(uci get network.lan.ipaddr 2>/dev/null || hostname -i):3000"
          echo "首次访问请完成初始化设置。"
          ENDOFFILE

          chmod +x adg_x86_64/install.sh
          cp adg_x86_64/install.sh adg_aarch64/install.sh

      - name: Create self-extracting packages
        run: |
          mv adg_x86_64 makeself/
          mv adg_aarch64 makeself/
          cd makeself
          ./makeself.sh adg_x86_64/ AdGuardHome_${{ env.VERSION }}_x86_64.run "AdGuardHome Installer x86_64" ./install.sh
          ./makeself.sh adg_aarch64/ AdGuardHome_${{ env.VERSION }}_aarch64.run "AdGuardHome Installer aarch64" ./install.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: adguardhome-${{ env.VERSION }}
          name: "AdGuardHome ${{ env.LATEST_TAG }}"
          files: makeself/AdGuardHome_*.run
