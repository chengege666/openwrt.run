name: Build Uninstall高级卸载 .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest version info
        id: fetch_version
        run: |
          echo "获取最新版本信息..."
          PAGE_CONTENT=$(curl -sk "https://xz.vumstar.com/")
          
          VERSION=$(echo "$PAGE_CONTENT" | grep -oP 'v\d+\.\d+\.\d+' | head -1)
          DATE=$(echo "$PAGE_CONTENT" | grep -A1 "$VERSION" | grep -oP '\d{4}-\d{1,2}-\d{1,2}' | head -1)
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "LATEST_VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          echo "最新版本: $VERSION"
          echo "发布日期: $DATE"

      - name: Download uninstall packages
        run: |
          mkdir -p uninstall_x86_64 uninstall_aarch64
          
          echo "下载 x86_64 版本..."
          curl -skL "https://xz.vumstar.com/download" -o "uninstall_x86_64/luci-app-uninstall_x86_64.run"
          
          echo "下载 aarch64 版本..."
          curl -skL "https://xz.vumstar.com/download" -o "uninstall_aarch64/luci-app-uninstall_aarch64.run"
          
          echo "文件信息:"
          ls -lh uninstall_x86_64/
          ls -lh uninstall_aarch64/

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## 高级卸载 For iStoreOS
          
          一站式快速不留痕卸载插件，X86设备、ARM设备均支持。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：iStoreOS 23.05 及以上
          - **支持架构**：x86_64、aarch64
          - **磁盘空间**：至少 20MB 可用空间
          - **权限要求**：root 权限
          
          ---
          
          ## 功能特性
          
          - **一键卸载**：快速卸载已安装的插件
          - **不留痕迹**：彻底清理配置文件和残留数据
          - **支持平台**：X86 设备、ARM 设备均可使用
          - **安全可靠**：卸载前会提示确认，防止误操作
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 安装 bash（必需）**
          ```bash
          opkg update
          opkg install bash
          ```
          
          **2. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          # x86_64 设备
          scp luci-app-uninstall_x86_64.run root@192.168.1.1:/tmp/
          
          # aarch64 设备
          scp luci-app-uninstall_aarch64.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将对应的 `.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 IPK 包！
          
          **3. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **4. 添加执行权限**
          ```bash
          # x86_64 设备
          chmod +x luci-app-uninstall_x86_64.run
          
          # aarch64 设备
          chmod +x luci-app-uninstall_aarch64.run
          ```
          
          **5. 执行安装**
          ```bash
          # x86_64 设备
          ./luci-app-uninstall_x86_64.run
          
          # aarch64 设备
          ./luci-app-uninstall_aarch64.run
          ```
          
          **6. 等待安装完成**
          - 安装过程会自动解压并安装插件
          - 看到安装成功提示后继续下一步
          
          **7. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **系统** 或 **服务** 菜单下找到 **高级卸载** 入口
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          opkg list-installed | grep uninstall
          ```
          
          **查看插件状态**：
          ```bash
          /etc/init.d/luci-app-uninstall status
          ```
          
          **访问界面**：
          - 在 LuCI 菜单中找到 **高级卸载** 入口
          - 或在浏览器打开对应管理页面
          
          ---
          
          ## 使用方法
          
          **1. 打开高级卸载界面**
          - 登录 LuCI 管理界面
          - 找到 **高级卸载** 菜单项
          
          **2. 选择要卸载的插件**
          - 在列表中勾选需要卸载的插件
          - 可以单选或多选
          
          **3. 执行卸载**
          - 点击 **卸载** 按钮
          - 确认卸载操作
          - 等待卸载完成
          
          **4. 验证卸载结果**
          - 检查插件是否已从列表中消失
          - 确认相关配置文件已清理
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 界面没有高级卸载菜单？
          **A**: 这是 LuCI 缓存问题，请：
          1. 退出 LuCI 登录
          2. 清除浏览器缓存
          3. 重新登录即可
          
          ### Q2: 如何确认我的设备架构？
          **A**: 通过 SSH 执行以下命令：
          ```bash
          uname -m
          ```
          - 输出 `x86_64` 选择 x86_64 版本
          - 输出 `aarch64` 选择 aarch64 版本
          
          ### Q3: 安装过程中出现权限错误？
          **A**: 确保使用 root 用户执行安装：
          ```bash
          sudo -i
          cd /tmp
          ./luci-app-uninstall_*.run
          ```
          
          ### Q4: 卸载插件后如何重新安装？
          **A**: 
          1. 通过 iStore 应用商店重新安装
          2. 或手动上传 IPK 包安装：
          ```bash
          opkg install 插件名.ipk
          ```
          
          ### Q5: 高级卸载能卸载所有插件吗？
          **A**: 
          - 支持卸载通过 opkg/iStore 安装的插件
          - 不支持卸载系统核心组件
          - 部分手动编译安装的插件可能需要手动清理
          
          ---
          
          ## 注意事项
          
          - **备份配置**：卸载前建议备份重要配置文件
          - **谨慎操作**：卸载后数据无法恢复，请确认后再操作
          - **系统插件**：不要卸载系统核心插件，可能导致系统不稳定
          - **依赖关系**：卸载某个插件可能会影响依赖它的其他插件
          
          ENDOFFILE

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: uninstall-${{ env.VERSION }}
          name: "高级卸载 ${{ env.VERSION }}"
          body_path: release_notes.md
          files: |
            uninstall_x86_64/luci-app-uninstall_x86_64.run
            uninstall_aarch64/luci-app-uninstall_aarch64.run
