name: Make TurboACC run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p x86_64/depends a53/depends

      - name: Download ipk files
        run: |
          # 增加匹配范围，确保能抓到不同架构的后缀
          FILE_PREFIXES=("luci-app-turboacc" "turboacc" "nft-nftables" "tcping" "dns2tcp" "dns2socks" "pdnsd-alt")
          BASE_URLS=("https://dl.openwrt.ai/packages-24.10/x86_64/kiddin9/" "https://dl.openwrt.ai/packages-24.10/aarch64_cortex-a53/kiddin9/")
          DIRS=("x86_64" "a53")

          for i in {0..1}; do
            URL="${BASE_URLS[$i]}"
            TARGET_DIR="${DIRS[$i]}/depends"
            echo "正在从 $URL 获取文件列表..."
            
            # 获取页面所有链接，匹配前缀后下载
            wget -qO- "$URL" | grep -oP 'href="\K[^"]*"' | while read -r FILE; do
              for PREFIX in "${FILE_PREFIXES[@]}"; do
                if [[ "$FILE" == "$PREFIX"* ]]; then
                  echo "Downloading: $FILE"
                  curl -L --retry 2 --connect-timeout 10 "${URL}${FILE}" -o "$TARGET_DIR/$FILE" -#
                  # 检查是否下载成功（文件大小是否大于0），失败则删除
                  if [ ! -s "$TARGET_DIR/$FILE" ]; then
                    echo "警告: $FILE 下载失败或为空，已跳过。"
                    rm -f "$TARGET_DIR/$FILE"
                  fi
                fi
              done
            done
          done

      - name: List and organize packages
        run: |
          # 将主程序移动到根目录，依赖包留在 depends 文件夹
          mv x86_64/depends/luci-app-turboacc*.ipk x86_64/ || echo "x86主程序未找到"
          mv a53/depends/luci-app-turboacc*.ipk a53/ || echo "a53主程序未找到"
          echo "=== 整理完成 ==="
          ls -R

      - name: Parse version
        id: setver
        run: |
          # 从文件名中提取版本号
          FILE=$(ls a53/luci-app-turboacc*.ipk | head -n 1)
          VERSION=$(echo "$FILE" | grep -oP '(?<=turboacc_)[^_]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Create install.sh
        run: |
          cat << 'EOF' > install.sh
          #!/bin/sh
          set -e
          echo "===> 正在更新软件源..."
          opkg update
          echo "===> 正在安装依赖..."
          opkg install depends/*.ipk --force-depends || true
          echo "===> 正在安装 TurboACC 主程序..."
          opkg install luci-app-turboacc*.ipk --force-depends
          echo "===> 安装完成！"
          EOF
          chmod +x install.sh
          cp install.sh x86_64/
          cp install.sh a53/

      - name: Install makeself
        run: sudo apt-get update && sudo apt-get install -y makeself

      - name: Create .run packages
        run: |
          mkdir -p output
          makeself x86_64/ "output/turboacc_x86_64-${{ steps.setver.outputs.version }}.run" "TurboACC x86_64 Installer" ./install.sh
          makeself a53/ "output/turboacc_aarch64_cortex-a53-${{ steps.setver.outputs.version }}.run" "TurboACC a53 Installer" ./install.sh

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: turboacc-${{ steps.setver.outputs.version }}
          name: TurboACC-${{ steps.setver.outputs.version }}
          files: output/*.run