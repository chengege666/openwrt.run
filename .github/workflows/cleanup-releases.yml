name: Cleanup Old Releases

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-22.04

    steps:
      - name: Delete all releases, tags and old workflow runs
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "仓库: $OWNER/$REPO"

          echo ""
          echo "=== 删除所有 Release ==="
          gh api "repos/$OWNER/$REPO/releases?per_page=100" --jq '.[].id' | while read id; do
            [ -z "$id" ] && continue
            echo "删除 Release ID: $id"
            gh api -X DELETE "repos/$OWNER/$REPO/releases/$id" || echo "  失败: $id"
          done

          echo ""
          echo "=== 删除所有 Tag ==="
          gh api "repos/$OWNER/$REPO/tags?per_page=100" --jq '.[].name' | while read tag; do
            [ -z "$tag" ] && continue
            echo "删除 Tag: $tag"
            gh api -X DELETE "repos/$OWNER/$REPO/git/refs/tags/$tag" || echo "  失败: $tag"
          done

          echo ""
          echo "=== 删除超过 1 小时的已完成工作流 ==="
          CUTOFF_EPOCH=$(date -u -d '-1 hour' '+%s')
          gh api "repos/$OWNER/$REPO/actions/runs?per_page=100&status=completed" --jq '.workflow_runs[] | select(.updated_at != null) | {id, updated_at}' | \
          jq -c --argjson cutoff "$CUTOFF_EPOCH" 'select((.updated_at | sub("\\.[0-9]+Z$"; "Z") | fromdate) < $cutoff) | .id' | \
          while read id; do
            [ -z "$id" ] && continue
            echo "删除工作流记录: $id"
            gh api -X DELETE "repos/$OWNER/$REPO/actions/runs/$id" || echo "  失败: $id"
          done

          echo ""
          echo "清理完成！"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
