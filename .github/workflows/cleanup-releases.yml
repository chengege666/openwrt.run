name: Cleanup Old Releases

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-22.04

    steps:
      - name: Delete all releases and tags
        run: |
          echo "正在删除所有 Release 和 Tag..."
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          gh release list --repo "$OWNER/$REPO" --limit 200 --json tagName --jq '.[].tagName' | while read tag; do
            echo "删除 Release: $tag"
            gh release delete "$tag" --repo "$OWNER/$REPO" -y
          done

          gh api "repos/$OWNER/$REPO/tags" --jq '.[].name' | while read tag; do
            echo "删除 Tag: $tag"
            gh api -X DELETE "repos/$OWNER/$REPO/git/refs/tags/$tag"
          done

          echo "Release/Tag 清理完成！"

      - name: Delete completed workflow runs older than 1 hour
        run: |
          echo "正在删除超过 1 小时的已完成工作流..."
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          CUTOFF_EPOCH=$(date -u -d '-1 hour' '+%s')

          gh run list --repo "$OWNER/$REPO" --limit 200 --json databaseId,conclusion,updatedAt | \
          jq -c --argjson cutoff "$CUTOFF_EPOCH" '.[] | select(.conclusion != null and ((.updatedAt | sub("\\.[0-9]+Z$"; "Z") | fromdate) < $cutoff)) | .databaseId' | \
          while read id; do
            [ -z "$id" ] && continue
            echo "删除工作流记录: $id"
            gh run delete "$id" --repo "$OWNER/$REPO" -y || true
          done

          echo "工作流记录清理完成！"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
