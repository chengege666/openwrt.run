name: Build Partexp（分区扩容） .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tag
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/sirpdboy/luci-app-partexp/releases/latest | jq -r '.tag_name')
          VERSION="${latest_tag#v}"
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download partexp IPK package
        run: |
          echo "Downloading Partexp IPK package for ${{ env.LATEST_TAG }}..."
          curl -sk "https://api.github.com/repos/sirpdboy/luci-app-partexp/releases/latest" > releases.txt

          mkdir -p partexp_build

          tar_url=$(grep "browser_download_url" releases.txt | grep "aarch64_generic.tar.gz" | head -1 | awk -F '"' '{print $4}')

          if [ -z "$tar_url" ]; then
            echo "Error: aarch64_generic.tar.gz not found"
            exit 1
          fi

          echo "Downloading: $tar_url"
          curl --connect-timeout 30 -m 600 -kLo "partexp_build/partexp.tar.gz" "$tar_url"

          echo "Extracting archive..."
          cd partexp_build
          tar -xzf partexp.tar.gz
          rm partexp.tar.gz
          find . -name "*.ipk" -exec mv {} . \;

          echo "IPK files:"
          ls -la *.ipk

          echo "Download completed."

      - name: Create install.sh
        run: |
          cat << 'EOF' > partexp_build/install.sh
          #!/bin/sh
          echo "===> Updating package list..."
          opkg update
          echo "===> Installing Partexp..."
          opkg install --force-depends *.ipk
          echo "===> Refreshing LuCI cache..."
          rm -rf /tmp/luci-modulecache /tmp/luci-indexcache
          echo "===> Restarting LuCI services..."
          /etc/init.d/uhttpd restart 2>/dev/null || /etc/init.d/nginx restart 2>/dev/null
          /etc/init.d/rpcd restart 2>/dev/null
          echo "===> Partexp installed successfully."
          echo "Please open LuCI to configure Partexp."
          EOF
          chmod +x partexp_build/install.sh

      - name: Create self-extracting package
        run: |
          mv partexp_build makeself/
          cd makeself
          ./makeself.sh partexp_build/ partexp_${{ env.VERSION }}.run "Partexp Installer v${{ env.VERSION }}" ./install.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: partexp-${{ env.VERSION }}
          name: "Partexp ${{ env.LATEST_TAG }}"
          body_path: ${{ github.workspace }}/info/partexp.md
          files: makeself/partexp_*.run
