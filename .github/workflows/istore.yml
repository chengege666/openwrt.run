name: Build iStore（应用商店） .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest version info
        id: fetch_version
        run: |
          echo "获取 iStore 最新版本信息..."
          
          # 从 iStore 仓库获取最新 commit 作为版本标识
          LATEST_COMMIT=$(curl -sk "https://api.github.com/repos/linkease/istore/commits/main" | jq -r '.sha' | cut -c1-7)
          COMMIT_DATE=$(curl -sk "https://api.github.com/repos/linkease/istore/commits/main" | jq -r '.commit.committer.date' | cut -dT -f1)
          
          VERSION="latest-${LATEST_COMMIT}"
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT_DATE=$COMMIT_DATE" >> $GITHUB_ENV
          echo "LATEST_COMMIT=$LATEST_COMMIT" >> $GITHUB_OUTPUT
          
          echo "最新版本: $VERSION"
          echo "更新日期: $COMMIT_DATE"

      - name: Download iStore installer
        run: |
          mkdir -p istore_output
          
          echo "下载 iStore 官方安装包..."
          curl -skL "https://github.com/linkease/openwrt-app-actions/raw/main/applications/luci-app-systools/root/usr/share/systools/istore-reinstall.run" \
            -o "istore_output/istore-reinstall.run"
          
          echo "文件信息:"
          ls -lh istore_output/
          file istore_output/istore-reinstall.run

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## iStore - OpenWrt 应用商店
          
          一个开源且标准的 OpenWRT 软件中心实现，纯脚本实现，只依赖 OpenWrt 标准组件。
          
          ---
          
          ## 系统要求
          
          - **OpenWrt 版本**：21.02 及以上（23.05 推荐）
          - **支持架构**：x86_64、aarch64 (arm64)
          - **依赖组件**：OpenWrt 21.x 需预先安装 `luci-compat`
          - **磁盘空间**：至少 50MB 可用空间
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 安装 bash（必需）**
          ```bash
          opkg update
          opkg install bash
          ```
          
          **2. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          scp istore-reinstall.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将 `istore-reinstall.run` 上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 IPK 包！
          
          **3. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **4. 添加执行权限**
          ```bash
          chmod +x istore-reinstall.run
          ```
          
          **5. 执行安装**
          ```bash
          ./istore-reinstall.run
          ```
          
          **6. 等待安装完成**
          - 安装过程会自动下载并安装 iStore 及其依赖组件
          - 看到 "iStore installed successfully" 或类似提示表示安装成功
          
          **7. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **服务** 菜单下找到 **iStore** 入口
          
          ---
          
          ## 验证安装
          
          **检查服务状态**：
          ```bash
          /etc/init.d/istore status
          ```
          
          **检查进程**：
          ```bash
          ps | grep istore
          ```
          
          **访问界面**：
          - 浏览器打开 `http://192.168.1.1/cgi-bin/luci/admin/services/istore`
          - 或在 LuCI 菜单：**服务 -> iStore**
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 界面没有 iStore 菜单？
          **A**: 这是 LuCI 缓存问题，请：
          1. 退出 LuCI 登录
          2. 清除浏览器缓存
          3. 重新登录即可
          
          ### Q2: 提示缺少 luci-compat 依赖？
          **A**: OpenWrt 21.x 需要安装兼容层：
          ```bash
          opkg update
          opkg install luci-compat
          ```
          
          ### Q3: 安装过程中出现错误？
          **A**: 检查以下几点：
          - 确保网络连接正常（需要下载依赖包）
          - 确保磁盘空间充足
          - 查看错误日志：`dmesg | tail -20`
          
          ### Q4: 如何卸载 iStore？
          **A**: 
          ```bash
          opkg remove luci-app-store
          opkg remove luci-lib-taskd
          opkg remove luci-lib-xterm
          ```
          
          ---
          
          ## 使用指南
          
          安装完成后：
          1. 打开 iStore 应用商店界面
          2. 浏览分类查找需要的插件
          3. 点击 **安装** 按钮一键安装插件
          4. 插件会自动处理依赖关系
          5. 安装完成后在对应菜单中使用
          
          ---

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: istore-${{ env.VERSION }}
          name: "iStore ${{ env.VERSION }}"
          body_path: release_notes.md
          files: istore_output/istore-reinstall.run
