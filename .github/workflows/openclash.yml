name: Build OpenClash .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p openclash-build
          git clone https://github.com/megastep/makeself.git

      - name: Download Files
        run: |
          # 1. 自动获取并下载最新的 luci-app-openclash
          echo "正在下载 OpenClash 插件..."
          # 获取 API 响应，并提取第一个符合 .ipk 结尾的资源链接
          OC_URL=$(curl -sL https://api.github.com/repos/vernesong/OpenClash/releases/latest | jq -r '.assets[] | select(.name | endswith(".ipk")) | .browser_download_url' | head -n 1)
          
          # 使用 --retry 选项增强网络稳定性
          wget -q --retry-connrefused --waitretry=3 --timeout=30 -O openclash-build/openclash.ipk "$OC_URL"
          
          # 2. 下载 Clash Meta 核心 (x86_64 兼容版本)
          echo "正在下载 Clash Meta 核心..."
          CORE_URL="https://github.com/MetaCubeX/Clash.Meta/releases/latest/download/clash.meta-linux-amd64-compatible-latest.gz"
          wget -q --retry-connrefused --waitretry=3 --timeout=30 "$CORE_URL" -O core.gz
          gunzip core.gz
          mv core openclash-build/clash
          chmod +x openclash-build/clash

      - name: Create install.sh
        run: |
          cat << 'EOF' > openclash-build/install.sh
          #!/bin/sh
          echo "===> 安装 OpenClash..."
          # 这里指定安装特定的 ipk 文件，避免通配符导致的混淆
          opkg install --force-depends openclash.ipk
          
          echo "===> 预置 Clash 核心..."
          mkdir -p /etc/openclash/core
          cp clash /etc/openclash/core/clash
          chmod +x /etc/openclash/core/clash
          
          echo "===> 安装完成。"
          EOF
          chmod +x openclash-build/install.sh

      - name: Create self-extracting .run package
        run: |
          ./makeself/makeself.sh openclash-build/ OpenClash_All_x86_64.run "OpenClash Installer" ./install.sh

      - name: Set Tag Name
        run: echo "TAG_NAME=OpenClash-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "OpenClash Bundle ${{ env.TAG_NAME }}"
          files: OpenClash_All_x86_64.run
