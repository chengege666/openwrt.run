name: Build OpenClash .run (Clone Method)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Directories
        run: mkdir -p openclash-x86

      - name: Checkout OpenClash package branch
        uses: actions/checkout@v4
        with:
          repository: vernesong/OpenClash
          ref: package
          path: OpenClash-Package

      - name: Checkout OpenClash core branch
        uses: actions/checkout@v4
        with:
          repository: vernesong/OpenClash
          ref: core
          path: OpenClash-Core

      - name: Prepare Files
        run: |
          # 复制 ipk 到工作目录
          cp OpenClash-Package/master/*.ipk openclash-x86/
          
          # 获取版本号
          VERSION=$(head -n 1 OpenClash-Package/master/version)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # 解压 x86_64 核心 (从 core 分支)
          tar -xzvf OpenClash-Core/master/meta/clash-linux-amd64-v1.tar.gz -C openclash-x86/
          mv openclash-x86/clash openclash-x86/clash_meta

      - name: Create install.sh
        run: |
          cat << 'EOF' > openclash-x86/install.sh
          #!/bin/sh
          # 安装插件
          opkg install --force-depends *.ipk
          # 移动核心
          mkdir -p /etc/openclash/core
          mv clash_meta /etc/openclash/core/
          chmod +x /etc/openclash/core/clash_meta
          echo "安装完成。"
          EOF
          chmod +x openclash-x86/install.sh

      - name: Create .run package
        run: |
          git clone https://github.com/megastep/makeself.git
          ./makeself/makeself.sh openclash-x86/ OpenClash_x86_64_${{ env.VERSION }}.run "OpenClash by Actions" ./install.sh

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## OpenClash .run
          
          一款功能强大的 OpenWrt 代理插件，支持多种代理协议和智能分流。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：OpenWrt 或 ImmortalWrt `22.03+`
          - **支持架构**：`x86_64`
          - **磁盘空间**：至少 50MB 可用空间
          - **权限要求**：root 权限
          
          ---
          
          ## 功能特性
          
          - **多协议支持**：支持 Shadowsocks、V2Ray、Trojan、Hysteria 等协议
          - **智能分流**：支持规则分流和全局模式
          - **订阅管理**：支持订阅链接自动更新节点
          - **Web 管理**：提供友好的 LuCI 管理界面
          - **核心集成**：内置 Clash Meta 核心
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          scp OpenClash_x86_64_*.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将 `OpenClash_x86_64_*.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 IPK 包！
          
          **2. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **3. 添加执行权限**
          ```bash
          chmod +x OpenClash_x86_64_*.run
          ```
          
          **4. 执行安装**
          ```bash
          ./OpenClash_x86_64_*.run
          ```
          
          **5. 等待安装完成**
          - 安装过程会自动解压并安装插件
          - 核心文件会自动部署
          - 看到安装成功提示后继续下一步
          
          **6. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **服务** 菜单下找到 **OpenClash** 入口
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          opkg list-installed | grep openclash
          ```
          
          **查看核心文件**：
          ```bash
          ls -lh /etc/openclash/core/
          ```
          
          **访问界面**：
          - 在 LuCI 菜单中找到 **服务 -> OpenClash** 入口
          
          ---
          
          ## 使用方法
          
          **1. 打开 OpenClash 设置界面**
          - 登录 LuCI 管理界面
          - 找到 **服务 -> OpenClash** 菜单项
          
          **2. 基本配置**
          - **运行模式**：选择代理模式（规则/全局/直连）
          - **监听端口**：设置代理监听端口
          - **DNS 设置**：配置 DNS 解析方式
          
          **3. 订阅管理**
          - 添加订阅链接
          - 更新节点列表
          - 选择可用节点
          
          **4. 保存并应用**
          - 点击 **保存并应用**
          - 重启 OpenClash 服务使配置生效
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 界面没有 OpenClash 菜单？
          **A**: 这是 LuCI 缓存问题，请：
          1. 退出 LuCI 登录
          2. 清除浏览器缓存
          3. 重新登录即可
          
          ### Q2: 核心文件缺失？
          **A**: 检查核心文件是否存在：
          ```bash
          ls -lh /etc/openclash/core/
          ```
          如果缺失，请重新安装或手动下载核心文件。
          
          ### Q3: 代理不生效？
          **A**: 检查以下几点：
          1. 确认 OpenClash 服务已启动
          2. 检查防火墙规则是否正确
          3. 查看日志：`logread | grep openclash`
          
          ### Q4: 如何卸载 OpenClash？
          **A**: 
          ```bash
          opkg remove luci-app-openclash
          rm -rf /etc/openclash
          ```
          
          ---
          
          ## 注意事项
          
          - **核心更新**：定期更新 Clash Meta 核心以获得最新功能
          - **订阅安全**：仅使用可信的订阅链接
          - **资源占用**：代理工具会占用一定系统资源
          
          ENDOFFILE

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openclash-${{ env.VERSION }}
          name: "OpenClash ${{ env.VERSION }}"
          body_path: release_notes.md
          files: OpenClash_x86_64_*.run
