name: Build OpenClash .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p openclash-build
          git clone https://github.com/megastep/makeself.git

      - name: Download Files
        run: |
          # 1. 尝试从 vernesong/OpenClash 下载最新 ipk
          # 这里不使用 API，直接通过 GitHub 网页结构抓取最新的 ipk 链接
          echo "正在下载 OpenClash 插件..."
          # 抓取 release 页面中最新的 .ipk 文件地址
          OC_URL=$(curl -sL https://github.com/vernesong/OpenClash/releases | grep -oE "/vernesong/OpenClash/releases/download/[^/]+/[^/]+\.ipk" | head -n 1)
          # 补全完整 URL
          FULL_OC_URL="https://github.com$OC_URL"
          echo "解析到的下载地址: $FULL_OC_URL"
          
          # 使用 wget 重试机制下载
          wget -q --retry-connrefused --waitretry=5 --timeout=30 -O openclash-build/openclash.ipk "$FULL_OC_URL"
          
          # 2. 下载 Clash Meta 核心
          echo "正在下载 Clash Meta 核心..."
          # 这里锁定特定架构的 Meta 核心，确保下载链接稳定
          wget -q --retry-connrefused --waitretry=5 --timeout=30 -O core.gz https://github.com/MetaCubeX/Clash.Meta/releases/latest/download/clash.meta-linux-amd64-compatible-latest.gz
          gunzip core.gz
          mv core openclash-build/clash
          chmod +x openclash-build/clash

      - name: Create install.sh
        run: |
          cat << 'EOF' > openclash-build/install.sh
          #!/bin/sh
          echo "===> 安装 OpenClash..."
          opkg install --force-depends openclash.ipk
          mkdir -p /etc/openclash/core
          cp clash /etc/openclash/core/clash
          chmod +x /etc/openclash/core/clash
          echo "===> 安装完成。"
          EOF
          chmod +x openclash-build/install.sh

      - name: Create self-extracting .run package
        run: |
          ./makeself/makeself.sh openclash-build/ OpenClash_All_x86_64.run "OpenClash Installer" ./install.sh

      - name: Set Tag Name
        run: echo "TAG_NAME=OpenClash-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "OpenClash Bundle ${{ env.TAG_NAME }}"
          files: OpenClash_All_x86_64.run
