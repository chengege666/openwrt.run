name: Build OpenClash .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p openclash-build
          git clone https://github.com/megastep/makeself.git

      - name: Download Files
        run: |
          # 1. 直接从 OpenWrt.ai 镜像源获取最新的 OpenClash ipk
          # 这是目前最稳妥的下载方式，不会触发 GitHub 的下载限制
          echo "正在下载 OpenClash 插件..."
          wget -q -O openclash-build/openclash.ipk https://dl.openwrt.ai/packages-24.10/x86_64/kiddin9/luci-app-openclash_latest_all.ipk || \
          wget -q -O openclash-build/openclash.ipk https://github.com/vernesong/OpenClash/releases/latest/download/luci-app-openclash_all.ipk

          # 2. 下载 Clash Meta 核心
          echo "正在下载 Clash Meta 核心..."
          wget -q -O core.gz https://github.com/MetaCubeX/Clash.Meta/releases/latest/download/clash.meta-linux-amd64-compatible-latest.gz
          gunzip core.gz
          mv core openclash-build/clash
          chmod +x openclash-build/clash

      - name: Create install.sh
        run: |
          cat << 'EOF' > openclash-build/install.sh
          #!/bin/sh
          echo "===> 安装 OpenClash..."
          opkg install --force-depends openclash.ipk
          mkdir -p /etc/openclash/core
          cp clash /etc/openclash/core/clash
          chmod +x /etc/openclash/core/clash
          echo "===> 安装完成。"
          EOF
          chmod +x openclash-build/install.sh

      - name: Create self-extracting .run package
        run: |
          ./makeself/makeself.sh openclash-build/ OpenClash_All_x86_64.run "OpenClash Installer" ./install.sh

      - name: Set Tag Name
        run: echo "TAG_NAME=OpenClash-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "OpenClash Bundle ${{ env.TAG_NAME }}"
          files: OpenClash_All_x86_64.run
