name: Make Passwall run file

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make-run:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install makeself
        run: sudo apt-get update && sudo apt-get install -y makeself

      - name: Prepare installer
        run: |
          mkdir -p passwall_installer
          chmod +x shell/passwall-install.sh
          cp shell/passwall-install.sh passwall_installer/install.sh
          test -s passwall_installer/install.sh

      - name: Pack installer
        id: pack
        run: |
          mkdir -p output
          VERSION="$(date +%Y%m%d-%H%M)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          makeself "passwall_installer" "output/luci-app-passwall-${VERSION}.run" \
            "Passwall Installer ${VERSION}" ./install.sh

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## PassWall .run
          
          一款功能强大的 OpenWrt 代理插件，支持多种代理协议和智能分流。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：OpenWrt 或 ImmortalWrt `23.05+`
          - **支持架构**：`x86_64`、`aarch64_cortex-a53`、`aarch64_generic`
          - **磁盘空间**：至少 50MB 可用空间
          - **权限要求**：root 权限
          
          ---
          
          ## 功能特性
          
          - **多协议支持**：支持 V2Ray、Trojan、Shadowsocks、Hysteria 等主流协议
          - **智能分流**：支持 GFW 列表、中国大陆列表等分流规则
          - **节点管理**：支持节点订阅、测速、自动切换
          - **Web 管理**：提供友好的 LuCI 管理界面
          - **完整依赖**：包含所有必需的依赖包
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          scp luci-app-passwall-*.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将 `.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 IPK 包！
          
          **2. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **3. 添加执行权限**
          ```bash
          chmod +x luci-app-passwall-*.run
          ```
          
          **4. 执行安装**
          ```bash
          ./luci-app-passwall-*.run
          ```
          
          **5. 等待安装完成**
          - 安装过程会自动解压并安装插件
          - 看到安装成功提示后继续下一步
          
          **6. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **服务** 菜单下找到 **PassWall** 入口
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          opkg list-installed | grep passwall
          ```
          
          **查看服务状态**：
          ```bash
          /etc/init.d/passwall status
          ```
          
          **访问界面**：
          - 在 LuCI 菜单中找到 **服务 -> PassWall** 入口
          
          ---
          
          ## 使用方法
          
          **1. 打开 PassWall 设置界面**
          - 登录 LuCI 管理界面
          - 找到 **服务 -> PassWall** 菜单项
          
          **2. 基本配置**
          - **运行模式**：选择代理模式（GFW 列表/全局/绕过中国大陆）
          - **节点设置**：添加或导入代理节点
          - **订阅管理**：配置节点订阅链接
          
          **3. 高级配置**
          - **DNS 设置**：配置 DNS 解析方式
          - **访问控制**：设置代理规则和例外
          - **负载均衡**：配置多节点负载均衡
          
          **4. 保存并应用**
          - 点击 **保存并应用**
          - 重启 PassWall 服务使配置生效
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 界面没有 PassWall 菜单？
          **A**: 这是 LuCI 缓存问题，请：
          1. 退出 LuCI 登录
          2. 清除浏览器缓存
          3. 重新登录即可
          
          ### Q2: 如何确认我的设备架构？
          **A**: 通过 SSH 执行以下命令：
          ```bash
          uname -m
          ```
          - 输出 `x86_64` 选择 x86_64 版本
          - 输出 `aarch64` 选择 aarch64 版本
          
          ### Q3: 代理不生效？
          **A**: 检查以下几点：
          1. 确认 PassWall 服务已启动
          2. 检查节点是否可用
          3. 查看日志：`logread | grep passwall`
          
          ### Q4: 如何卸载 PassWall？
          **A**: 
          ```bash
          opkg remove luci-app-passwall
          ```
          
          ---
          
          ## 注意事项
          
          - **依赖完整**：安装包已包含所有必需依赖
          - **节点管理**：建议定期更新订阅获取最新节点
          - **资源占用**：代理工具会占用一定系统资源
          
          ENDOFFILE

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "passwall-${{ steps.pack.outputs.version }}"
          name: "passwall-${{ steps.pack.outputs.version }}"
          body_path: release_notes.md
          files: output/*.run
