name: Build Passwall .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p passwall_x86_64/depends passwall_x86_64/main
          git clone https://github.com/megastep/makeself.git

      - name: Download Passwall Files
        run: |
          # 定义一个超强下载函数：原生下载失败自动切换 ghproxy 镜像代理
          safe_download() {
            local url=$1
            local output=$2
            echo "尝试下载: $url"
            wget -q --timeout=60 --tries=5 --retry-connrefused --waitretry=5 -O "$output" "$url" || \
            wget -q --timeout=60 --tries=5 --retry-connrefused --waitretry=5 -O "$output" "https://ghproxy.com/$url" || \
            wget -q --timeout=60 --tries=5 --retry-connrefused --waitretry=5 -O "$output" "https://mirror.ghproxy.com/$url"
            test -s "$output"
          }

          # 1. 下载依赖包 
          safe_download "https://github.com/wkccd/storage/releases/download/pw/passwall_packages_ipk_x86_64.zip" "depends.zip"
          unzip -q depends.zip -d passwall_x86_64/depends/
          find passwall_x86_64/depends -name '*.ipk' | grep -q .
          
          # 2. 下载主程序和中文包 (使用 GitHub 官方重定向链接)
          safe_download "https://github.com/Openwrt-Passwall/openwrt-passwall/releases/latest/download/luci-app-passwall_all.ipk" "passwall_x86_64/main/luci-app-passwall_all.ipk"
          safe_download "https://github.com/Openwrt-Passwall/openwrt-passwall/releases/latest/download/luci-i18n-passwall-zh-cn_all.ipk" "passwall_x86_64/main/luci-i18n-passwall-zh-cn_all.ipk"

          # 3. 验证下载是否成功
          if [ ! -s "passwall_x86_64/main/luci-app-passwall_all.ipk" ]; then
            echo "错误：关键文件下载失败，请检查链接有效性。"
            exit 1
          fi
          if [ ! -s "passwall_x86_64/main/luci-i18n-passwall-zh-cn_all.ipk" ]; then
            echo "错误：中文语言包下载失败，请检查链接有效性。"
            exit 1
          fi

          # 4. （可选）列出依赖包内容，方便检查
          echo "依赖包内容预览："
          unzip -l depends.zip | head -n 30

      - name: Create install.sh
        run: |
          cat << 'EOF' > passwall_x86_64/install.sh
          #!/bin/sh
          set -e

          SCRIPT_DIR="$(CDPATH= cd -- "$(dirname "$0")" && pwd)"
          DEPENDS_DIR="$SCRIPT_DIR/depends"
          MAIN_DIR="$SCRIPT_DIR/main"

          log() {
              echo "===> $*"
          }

          fail() {
              echo "错误：$*" >&2
              exit 1
          }

          require_pkg_dir() {
              [ -d "$1" ] || fail "目录不存在: $1"
              ls "$1"/*.ipk >/dev/null 2>&1 || fail "目录中没有找到 ipk 包: $1"
          }

          install_optional_pkg() {
              pkg="$1"
              if opkg list-installed | grep -q "^$pkg "; then
                  log "已安装可选依赖: $pkg"
                  return 0
              fi

              if opkg install "$pkg"; then
                  log "已安装可选依赖: $pkg"
                  return 0
              fi

              echo "警告：跳过可选依赖 $pkg，当前系统可能不提供该包。"
              return 0
          }

          require_pkg_dir "$DEPENDS_DIR"
          require_pkg_dir "$MAIN_DIR"

          log "正在更新软件源..."
          opkg update

          log "尝试安装常见网络内核依赖..."
          install_optional_pkg kmod-nft-tproxy
          install_optional_pkg kmod-nft-socket
          install_optional_pkg iptables-mod-tproxy
          install_optional_pkg iptables-mod-socket
          install_optional_pkg iptables-mod-iprange
          install_optional_pkg iptables-mod-conntrack-extra

          log "正在安装依赖包..."
          opkg install "$DEPENDS_DIR"/*.ipk || fail "依赖包安装失败，请检查系统架构、OpenWrt 版本或依赖源是否匹配。"

          log "正在安装 Passwall 主程序..."
          opkg install "$MAIN_DIR"/*.ipk || fail "Passwall 主程序安装失败，请检查主包与依赖包版本是否匹配。"

          if ! opkg list-installed | grep -q '^luci-app-passwall '; then
              fail "未检测到 luci-app-passwall 已安装。"
          fi

          log "刷新 LuCI 菜单缓存..."
          rm -rf /tmp/luci-modulecache /tmp/luci-indexcache

          log "重启 Web 服务..."
          /etc/init.d/uhttpd restart 2>/dev/null || /etc/init.d/nginx restart 2>/dev/null
          /etc/init.d/rpcd restart 2>/dev/null

          if [ -f /usr/share/luci/menu.d/luci-app-passwall.json ] || [ -f /usr/lib/lua/luci/controller/passwall.lua ]; then
              log "已检测到 LuCI 入口文件。"
          else
              echo "警告：未检测到传统 LuCI 入口文件，请手动刷新页面并检查“服务”菜单。"
          fi

          log "安装完成，请刷新浏览器页面查看 Passwall 服务。"
          EOF
          chmod +x passwall_x86_64/install.sh

      - name: Create .run package
        run: |
          ./makeself/makeself.sh passwall_x86_64/ Passwall_x86_64_latest.run "Passwall Installer" ./install.sh

      - name: Set Tag Name
        run: echo "TAG_NAME=Passwall-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "PassWall Bundle ${{ env.TAG_NAME }}"
          files: Passwall_x86_64_latest.run
