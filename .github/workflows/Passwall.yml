name: Build Passwall .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p passwall_x86_64/depends passwall_x86_64/main
          git clone https://github.com/megastep/makeself.git

      - name: Download Passwall Files
        run: |
          # 定义一个超强下载函数：原生下载失败自动切换 ghproxy 镜像代理
          safe_download() {
            local url=$1
            local output=$2
            echo "尝试下载: $url"
            wget -q --timeout=60 --tries=5 --retry-connrefused --waitretry=5 -O "$output" "$url" || \
            wget -q --timeout=60 --tries=5 --retry-connrefused --waitretry=5 -O "$output" "https://ghproxy.com/$url" || \
            wget -q --timeout=60 --tries=5 --retry-connrefused --waitretry=5 -O "$output" "https://mirror.ghproxy.com/$url"
          }

          # 1. 下载依赖包 
          safe_download "https://github.com/wkccd/storage/releases/download/pw/passwall_packages_ipk_x86_64.zip" "depends.zip"
          unzip -q depends.zip -d passwall_x86_64/depends/
          
          # 2. 下载主程序和中文包 (使用 GitHub 官方重定向链接)
          safe_download "https://github.com/Openwrt-Passwall/openwrt-passwall/releases/latest/download/luci-app-passwall_all.ipk" "passwall_x86_64/main/luci-app-passwall_all.ipk"
          safe_download "https://github.com/Openwrt-Passwall/openwrt-passwall/releases/latest/download/luci-i18n-passwall-zh-cn_all.ipk" "passwall_x86_64/main/luci-i18n-passwall-zh-cn_all.ipk"

          # 3. 验证下载是否成功
          if [ ! -f "passwall_x86_64/main/luci-app-passwall_all.ipk" ]; then
            echo "错误：关键文件下载失败，请检查链接有效性。"
            exit 1
          fi

          # 4. （可选）列出依赖包内容，方便检查
          echo "依赖包内容预览："
          unzip -l depends.zip | head -n 30

      - name: Create install.sh
        run: |
          cat << 'EOF' > passwall_x86_64/install.sh
          #!/bin/sh
          set -e  # 遇到错误立即退出，避免掩盖问题

          echo "===> 正在更新软件源..."
          opkg update

          echo "===> 正在安装网络依赖..."
          opkg install --force-depends iptables-mod-tproxy iptables-mod-socket iptables-mod-iprange iptables-mod-conntrack-extra

          echo "===> 正在安装 Passwall..."
          opkg install --force-depends depends/*.ipk
          opkg install --force-depends main/*.ipk

          # 验证核心文件是否真的安装成功
          if [ ! -f /usr/lib/lua/luci/controller/passwall.lua ]; then
              echo "错误：未找到 passwall 控制器文件，安装可能不完整！"
              exit 1
          fi

          echo "===> 刷新 LuCI 菜单..."
          # 清除 LuCI 缓存
          rm -rf /tmp/luci-modulecache /tmp/luci-indexcache
          # 重启 Web 服务（兼容 uhttpd 和 nginx）
          /etc/init.d/uhttpd restart 2>/dev/null || /etc/init.d/nginx restart 2>/dev/null
          # 重启 rpcd（部分插件用到）
          /etc/init.d/rpcd restart 2>/dev/null

          echo "===> 安装完成！请刷新浏览器页面查看 Passwall 服务。"
          EOF
          chmod +x passwall_x86_64/install.sh

      - name: Create .run package
        run: |
          ./makeself/makeself.sh passwall_x86_64/ Passwall_x86_64_latest.run "Passwall Installer" ./install.sh

      - name: Set Tag Name
        run: echo "TAG_NAME=Passwall-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "PassWall Bundle ${{ env.TAG_NAME }}"
          files: Passwall_x86_64_latest.run
