name: Build Passwall .run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p passwall_x86_64/depends passwall_x86_64/main
          git clone https://github.com/megastep/makeself.git

      - name: Download Passwall Files
        run: |
          # 1. 下载依赖压缩包 (使用固定URL，确保无空格)
          echo "正在下载依赖包..."
          wget -q -O depends.zip "https://github.com/wkccd/storage/releases/download/pw/passwall_packages_ipk_x86_64.zip"
          unzip -q depends.zip -d passwall_x86_64/depends/
          
          # 2. 直接下载主程序和中文包 (使用 GitHub 最新发布重定向链接)
          echo "正在下载主程序和中文包..."
          wget -q -P passwall_x86_64/main/ "https://github.com/Openwrt-Passwall/openwrt-passwall/releases/latest/download/luci-app-passwall_all.ipk"
          wget -q -P passwall_x86_64/main/ "https://github.com/Openwrt-Passwall/openwrt-passwall/releases/latest/download/luci-i18n-passwall-zh-cn_all.ipk"

          # 3. 验证下载
          if [ ! -f "passwall_x86_64/main/luci-app-passwall_all.ipk" ]; then
            echo "错误：下载失败！"
            exit 1
          fi

      - name: Create install.sh
        run: |
          cat << 'EOF' > passwall_x86_64/install.sh
          #!/bin/sh
          echo "===> 正在更新软件包列表..."
          opkg update
          
          echo "===> 正在安装网络基础依赖..."
          opkg install --force-depends iptables-mod-tproxy iptables-mod-socket iptables-mod-iprange iptables-mod-conntrack-extra
          
          echo "===> 正在安装 Passwall 组件..."
          opkg install --force-depends depends/*.ipk
          opkg install --force-depends main/*.ipk
          
          echo "===> 安装完成。"
          EOF
          chmod +x passwall_x86_64/install.sh

      - name: Create .run package
        run: |
          ./makeself/makeself.sh passwall_x86_64/ Passwall_x86_64_latest.run "Passwall Installer" ./install.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Passwall-$(date +%Y%m%d-%H%M)"
          name: "PassWall Bundle"
          files: Passwall_x86_64_latest.run
